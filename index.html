// ── HELPERS ──────────────────────────────────────────────────────────────
function risk(p){
  let s=0;
  if(p.glucose>300)s+=30;else if(p.glucose>200)s+=20;else if(p.glucose>140)s+=10;
  if(p.hba1c>9)s+=25;else if(p.hba1c>8)s+=15;else if(p.hba1c>7)s+=8;
  if(p.sbp>160)s+=20;else if(p.sbp>140)s+=12;else if(p.sbp>130)s+=6;
  if(p.bmi>30)s+=10;else if(p.bmi>27)s+=5;
  if(p.adherence<40)s+=15;else if(p.adherence<60)s+=8;else if(p.adherence<75)s+=3;
  return{score:s,level:s>=60?"high":s>=30?"medium":"low"};
}
function gSt(v){
  if(v<70)return{label:"LOW",c:C.r5,bg:C.r1};
  if(v<=140)return{label:"NORMAL",c:C.g7,bg:C.g1};
  if(v<=200)return{label:"ELEVATED",c:C.o5,bg:C.o1};
  return{label:"HIGH",c:C.r5,bg:C.r1};
}
function rC(r){return r==="high"?C.r5:r==="medium"?C.o5:C.g6;}
function rBg(r){return r==="high"?C.r1:r==="medium"?C.o1:C.g1;}
function aiMsg(p){
  const {level}=risk(p);
  if(level==="high")return"Urgent: Consider insulin initiation or emergency referral.";
  if(p.adherence<50)return"Poor adherence. Schedule counseling session.";
  if(new Date(p.nextVisit)<new Date())return"Overdue follow-up. Call to reschedule.";
  return"Patient on track. Continue current care plan.";
}
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
}
function toast(msg,type="ok"){

}

  ]));
  
  // AI recommendations
  colLeft.appendChild(card([
    h("h3",{style:{fontSize:"15px",fontWeight:"800",color:C.g7,marginBottom:"8px"}},"🤖 Mizan AI Clinical Guide"),
    h("p",{style:{fontSize:"14px",color:C.dk,lineHeight:"1.6"}},aiMsg(p))
  ],{p:16}));

  layout.appendChild(colLeft);

  // Right column clinical workspace actions
  const colRight=h("div",{style:{width:"320px"}});
  const actionGroup=card([
    h("h3",{style:{fontSize:"15px",fontWeight:"800",color:C.dk,marginBottom:"14px"}},"Clinical Desk Actions")
  ]);
  
  const actionsList=[
    {l:"📝 Update Treatment Plan",fn:()=>toast("Plan editor launched")},
    {l:"💊 Refill Medications",fn:()=>toast("Prescription extended!")},
    {l:"📊 Order Lab Investigations",fn:()=>toast("Laboratory orders dispatched")},
    {l:"🚨 Trigger Urgent Alert",fn:()=>toast("Emergency notification sent!","error"),danger:true}
  ];

  actionsList.forEach(act=>{
    actionGroup.appendChild(h("button",{onClick:act.fn,
      style:{width:"100%",padding:"12px",background:act.danger?C.r1:C.wh,border:`1.5px solid ${act.danger?C.r5:C.bd}`,
        borderRadius:"12px",color:act.danger?C.r5:C.dk,fontWeight:"700",fontSize:"13px",
        cursor:"pointer",textAlign:"left",marginBottom:"8px",transition:"all .15s"}},act.l));
  });
  colRight.appendChild(actionGroup);
  layout.appendChild(colRight);

  wrap.appendChild(layout);
  return wrap;
}

// ── MAIN RENDER EXECUTION CYCLE ──────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(!app) return;
  app.innerHTML="";
  
  if(STATE.screen==="auth") app.appendChild(renderAuth());
  else if(STATE.role==="patient") app.appendChild(renderPatient());
  else app.appendChild(renderClinic());
}

// Online/offline environment detection handlers
window.addEventListener("online",()=>{STATE.online=true;render();toast("Connected to cloud backend framework.");});
window.addEventListener("offline",()=>{STATE.online=false;render();toast("Local fallback active. Preserving clinical changes locally.","warn");});

// ── DATA INITIALIZATION & BACKEND SYNC INTEGRATION ────────────────────────
STATE.readings = load("readings", []);
STATE.vitals = load("vitals", []);
STATE.missed = load("missed", []);

if (!STATE.screen) {
  STATE.screen = "auth";
}

// 1. Firebase Authentication State Core Observer
window.auth.onAuthStateChanged((user) => {
  if (user) {
    STATE.screen = "app";
    if (user.email && user.email.includes("doctor")) {
      STATE.role = "doctor";
    } else {
      STATE.role = "patient";
    }
  } else {
    STATE.screen = "auth";
    STATE.role = null;
  }
  render();
});

// 2. Global Cloud Authentication Event Controller Trigger
window.loginWithFirebase = async (email, password) => {
  try {
    if (!email || !password) {
      toast("Please provide both email and password.", "warn");
      return;
    }
    const { signInWithEmailAndPassword } = window.authModules;
    await signInWithEmailAndPassword(window.auth, email.trim(), password);
    toast("Welcome back to Mizan!", "success");
  } catch (error) {
    let cleanMsg = error.message;
    if (error.code === "auth/invalid-credential") cleanMsg = "Incorrect email or password.";
    if (error.code === "auth/invalid-email") cleanMsg = "Please enter a valid email format.";
    alert("Authentication Error: " + cleanMsg);
  }
};

// Initial system draw paint
render();
</script>
</body>
</html>
