function riskScore(p){
  let s=0;
  const g=Number(p.glucose||0),h=Number(p.hba1c||0),sbp=Number(p.sbp||0),bmi=Number(p.bmi||0),adh=Number(p.adherence||100);
  if(g>300)s+=30;else if(g>200)s+=20;else if(g>140)s+=10;
  if(h>9)s+=25;else if(h>8)s+=15;else if(h>7)s+=8;
  if(sbp>160)s+=20;else if(sbp>140)s+=12;else if(sbp>130)s+=6;
  if(bmi>30)s+=10;else if(bmi>27)s+=5;
  if(adh<40)s+=15;else if(adh<60)s+=8;else if(adh<75)s+=3;
  return{score:s,level:s>=60?"high":s>=30?"medium":"low"};
}
function gSt(v){const n=Number(v);if(n<70)return{label:"LOW",c:C.r5,bg:C.r1};if(n<=140)return{label:"NORMAL",c:C.g7,bg:C.g1};if(n<=200)return{label:"ELEVATED",c:C.o5,bg:C.o1};return{label:"HIGH",c:C.r5,bg:C.r1};}
function rC(r){return r==="high"?C.r5:r==="medium"?C.o5:C.g6;}
function rBg(r){return r==="high"?C.r1:r==="medium"?C.o1:C.g1;}
function aiMsg(p){const{level}=riskScore(p);if(level==="high")return"Urgent: Consider insulin initiation or emergency referral.";if(Number(p.adherence||100)<50)return"Poor adherence. Schedule counseling.";if(p.nextVisit&&new Date(p.nextVisit)<new Date())return"Overdue follow-up. Call to reschedule.";return"Patient on track. Continue current care plan.";}

function el(tag,attrs,...ch){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function")e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else e.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c==null||c===false||c===undefined)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});
  return e;
}

async function saveDoc(path,data){try{await setDoc(doc(db,...path.split("/")),{...data,updatedAt:serverTimestamp()},{merge:true});return true;}catch(e){console.error(e);return false;}}
async function addToCol(colPath,data){try{const r=await addDoc(collection(db,...colPath.split("/")),{...data,createdAt:serverTimestamp()});return r.id;}catch(e){console.error(e);return null;}}
async function getDocData(path){try{const s=await getDoc(doc(db,...path.split("/")));return s.exists()?{id:s.id,...s.data()}:null;}catch(e){return null;}}
async function queryCol(colPath,conditions=[],ord=null,lim=null){
  try{
    let ref=collection(db,...colPath.split("/"));
    let constraints=conditions.map(([f,op,v])=>where(f,op,v));
    if(ord)constraints.push(orderBy(ord,"desc"));
    if(lim)constraints.push(limit(lim));

       {l:"🚨 Flag Emergency",fn:async()=>{await saveDoc("users/"+p.id,{emergency:true,emergencyFlaggedBy:docName,emergencyAt:new Date().toISOString()});await addToCol("chats/"+p.id+"/messages",{text:"🚨 URGENT: Please come to Mizan Clinic immediately or call emergency services. Your health readings require immediate attention.",senderId:S.user.uid,senderName:docName,senderRole:"doctor",time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),patientId:p.id});await saveDoc("chats/"+p.id,{lastMsg:"URGENT: Please come to clinic immediately.",lastTime:serverTimestamp(),unreadByDoctor:false});toast(p.name+" flagged as emergency & notified!","warn");}}
      ].forEach(a=>{ag.appendChild(el("button",{onClick:a.fn,style:{padding:"13px",background:a.danger?C.r1:C.wh,border:`1.5px solid ${a.danger?C.r5:C.bd}`,borderRadius:"11px",color:a.danger?C.r5:C.dk,fontWeight:"700",fontSize:"13px",cursor:"pointer",textAlign:"left"}},a.l));});
      main.appendChild(ag);
    }
  }

  // ── ENROLL MODAL ──────────────────────────────────────────────────────────
  function showEnrollModal(){
    showModal(box=>{
      box.appendChild(el("h3",{style:{fontSize:"17px",fontWeight:"800",color:C.dk,marginBottom:"16px"}},t.enrollForm));
      let ev={name:"",email:"",phone:"",sex:"",age:"",city:"",diabType:""};
      const{wrap:nw}=fld(t.name,{required:true,placeholder:"e.g. Almaz Tadesse",onChange:v=>ev.name=v});box.appendChild(nw);
      const{wrap:ew2}=fld(t.email,{type:"email",required:true,placeholder:"patient@email.com",onChange:v=>ev.email=v});box.appendChild(ew2);
      const{wrap:pw}=fld(t.phone,{type:"tel",required:true,placeholder:"e.g. 0911234567",onChange:v=>ev.phone=v});box.appendChild(pw);
      const{wrap:sw2}=fld(t.sex,{options:[["male",t.male],["female",t.female]],required:true,onChange:v=>ev.sex=v});box.appendChild(sw2);
      const{wrap:aw}=fld(t.age,{type:"number",required:true,placeholder:"e.g. 45",onChange:v=>ev.age=v});box.appendChild(aw);
      const{wrap:cw}=fld(t.city,{required:true,placeholder:"e.g. Gondar",onChange:v=>ev.city=v});box.appendChild(cw);
      const{wrap:dw}=fld(t.diabType,{options:[["type1",t.type1],["type2",t.type2],["gestational",t.gestational],["other",t.other]],required:true,onChange:v=>ev.diabType=v});box.appendChild(dw);
      const sb=btn("Enroll Patient",async()=>{
        if(!ev.name||!ev.email||!ev.phone||!ev.sex||!ev.age||!ev.city||!ev.diabType){toast("Fill all required fields","error");return;}
        sb.textContent="Enrolling...";sb.disabled=true;
        const tempPass="Mizan@"+Math.random().toString(36).slice(-6);
        try{
          const cred=await createUserWithEmailAndPassword(auth,ev.email,tempPass);
          await saveDoc("users/"+cred.user.uid,{...ev,age:Number(ev.age),role:"patient",status:"active",plan:"basic",planStatus:"unpaid",enrolledBy:docName,enrolledAt:new Date().toISOString(),glucose:"",hba1c:"",sbp:"",dbp:"",bmi:"",weight:"",height:"",adherence:100});
          await saveDoc("chats/"+cred.user.uid,{patientId:cred.user.uid,patientName:ev.name,lastMsg:"Welcome to Mizan!",lastTime:serverTimestamp(),unreadByDoctor:false});
          await addToCol("chats/"+cred.user.uid+"/messages",{text:"Welcome to Mizan Diabetes Care, "+ev.name+"! Your account has been created by Dr. "+docName+". Your login email is: "+ev.email+" and your temporary password is: "+tempPass+". Please log in and change your password.",senderId:S.user.uid,senderName:docName,senderRole:"doctor",time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),patientId:cred.user.uid});
          toast("✓ Patient enrolled! Temp password: "+tempPass);
          closeModal();
          // Re-sign in as doctor
          const docPass=prompt("Re-enter YOUR doctor password to continue:");
          if(docPass)await signInWithEmailAndPassword(auth,S.userDoc.email,docPass);
        }catch(err){toast("Error: "+err.message,"error");sb.textContent="Enroll Patient";sb.disabled=false;}
      },{full:true,v:"green"});
      box.appendChild(sb);
      box.appendChild(el("div",{style:{marginTop:"10px"}},btn(t.cancel,closeModal,{full:true,v:"muted"})));
    });
  }

  // ── DELETE CONFIRM ────────────────────────────────────────────────────────
  function confirmDelete(p){
    showModal(box=>{
      box.appendChild(el("div",{style:{textAlign:"center",marginBottom:"16px"}},el("div",{style:{fontSize:"40px",marginBottom:"8px"}},"⚠️"),el("h3",{style:{fontSize:"16px",fontWeight:"800",color:C.r5,marginBottom:"8px"}},"Delete Patient"),el("p",{style:{fontSize:"14px",color:C.dk,lineHeight:"1.6"}},"Delete "+p.name+"? All their data will be permanently removed. This cannot be undone.")));
      box.appendChild(el("div",{style:{display:"flex",gap:"10px"}},
        btn(t.cancel,closeModal,{full:true,v:"muted"}),
        btn("Delete",async()=>{
          for(const col of["readings","vitals","notes","investigations","imaging","medications","appointments","missed","refills"]){const docs=await queryCol("users/"+p.id+"/"+col);for(const d of docs)await delDoc("users/"+p.id+"/"+col+"/"+d.id);}
          await delDoc("users/"+p.id);
          const chatMsgs=await queryCol("chats/"+p.id+"/messages");for(const m of chatMsgs)await delDoc("chats/"+p.id+"/messages/"+m.id);
          await delDoc("chats/"+p.id);
          toast(p.name+" deleted.","warn");closeModal();S.selectedPt=null;S.patients=S.patients.filter(pt=>pt.id!==p.id);renderMain();
        },{full:true,danger:true})
      ));
    });
  }

  renderMain();
  return wrap;
}

// ── MAIN RENDER & AUTH LISTENER ───────────────────────────────────────────
function render(){
  const appDiv=document.getElementById("app");appDiv.innerHTML="";
  if(S.screen==="auth")appDiv.appendChild(renderAuth());
  else if(S.screen==="pending")appDiv.appendChild(renderPending());
  else if(S.role==="patient")appDiv.appendChild(renderPatient());
  else appDiv.appendChild(renderClinic());
}

onAuthStateChanged(auth,async(user)=>{
  document.getElementById("loadingScreen").style.display="none";
  document.getElementById("app").style.display="block";
  if(user){
    S.user=user;
    const profile=await getDocData("users/"+user.uid);
    S.userDoc=profile;S.role=profile?.role||"patient";
    if(S.role==="patient"&&profile?.status==="pending")S.screen="pending";
    else S.screen="app";
  }else{
    if(S.chatUnsub){S.chatUnsub();S.chatUnsub=null;}
    if(S.patientsUnsub){S.patientsUnsub();S.patientsUnsub=null;}
    S.user=null;S.userDoc=null;S.role=null;S.screen="auth";S.patients=[];
  }
  render();
});

// Fallback: if Firebase never responds in 12 seconds, show login anyway
setTimeout(()=>{
  if(document.getElementById("loadingScreen")&&document.getElementById("loadingScreen").style.display!=="none"){
    document.getElementById("loadingScreen").style.display="none";
    document.getElementById("app").style.display="block";
    S.screen="auth";
    render();
  }
},12000);

window.addEventListener("online",()=>{S.online=true;render();});
window.addEventListener("offline",()=>{S.online=false;render();});
</script>
</body>
