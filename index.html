// ── OFFLINE STORE (localStorage simulation) ───────────────────────────────────
const OfflineStore = {
  get: (key) => { try { return JSON.parse(localStorage.getItem("mizan_"+key)||"null"); } catch { return null; } },
  set: (key, val) => { try { localStorage.setItem("mizan_"+key, JSON.stringify(val)); } catch {} },
  push: (key, item) => {
    const arr = OfflineStore.get(key) || [];
    arr.unshift(item);
    OfflineStore.set(key, arr);
    return arr;
  }
};

// ── AI RISK STRATIFICATION ─────────────────────────────────────────────────────
const calcRiskScore = (p) => {
  let score = 0;
  if (p.glucose > 300) score += 30;
  else if (p.glucose > 200) score += 20;
  else if (p.glucose > 140) score += 10;
  if (p.hba1c > 9) score += 25;
  else if (p.hba1c > 8) score += 15;
  else if (p.hba1c > 7) score += 8;
  if (p.sbp > 160) score += 20;
  else if (p.sbp > 140) score += 12;
  else if (p.sbp > 130) score += 6;
  if (p.bmi > 30) score += 10;
  else if (p.bmi > 27) score += 5;
  if (p.adherence < 40) score += 15;
  else if (p.adherence < 60) score += 8;
  else if (p.adherence < 75) score += 3;
  const risk = score >= 60 ? "high" : score >= 30 ? "medium" : "low";
  return { score, risk };
};

const aiRec = (p) => {
  const { score, risk } = calcRiskScore(p);
  if (risk === "high") return { msg: "Urgent consultation needed. Consider insulin initiation, BP medication review, or emergency referral.", lvl: "danger" };
  if (p.adherence < 50) return { msg: "Poor adherence detected. Send education reminder and schedule counseling session.", lvl: "warn" };
  if (new Date(p.nextVisit) < new Date()) return { msg: "Overdue follow-up. Call patient to reschedule as soon as possible.", lvl: "warn" };
  return { msg: "Patient is on track. Continue current care plan. Next review on schedule.", lvl: "ok" };
};

const riskC = r => r==="high"?C.r500:r==="medium"?C.o500:C.g600;
const riskBg = r => r==="high"?C.r100:r==="medium"?C.o100:C.g100;

const gStatus = v => {
  if(v<70) return {label:"LOW",c:C.r500,bg:C.r100,icon:"🔴",advice:"Eat something sweet immediately."};
  if(v<=140) return {label:"NORMAL",c:C.g600,bg:C.g100,icon:"🟢",advice:"Great control! Keep following your care plan."};
  if(v<=200) return {label:"ELEVATED",c:C.o500,bg:C.o100,icon:"🟡",advice:"Avoid sugary foods. Monitor closely today."};
  return {label:"HIGH",c:C.r500,bg:C.r100,icon:"🔴",advice:"Dangerously high. Contact Mizan clinic immediately."};
};

// ── GLUCOSE CHART ──────────────────────────────────────────────────────────────
const Chart = ({data=WEEK,compact=false}) => {
  const H=compact?100:160,W=300,pad=20,max=300;
  const x=i=>pad+(i/(data.length-1))*(W-pad*2);
  const y=v=>H-pad-(v/max)*(H-pad*2);
  const path=key=>data.map((d,i)=>`${i===0?"M":"L"}${x(i)},${y(d[key])}`).join(" ");
  return (
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:compact?100:170}} preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="gp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.p500} stopOpacity="0.25"/><stop offset="100%" stopColor={C.p500} stopOpacity="0"/></linearGradient>
          <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.g500} stopOpacity="0.25"/><stop offset="100%" stopColor={C.g500} stopOpacity="0"/></linearGradient>
        </defs>
        {[70,140,200].map(v=>(
          <g key={v}><line x1={pad} y1={y(v)} x2={W-pad} y2={y(v)} stroke={C.border} strokeWidth="0.8" strokeDasharray="4,4"/><text x={W-pad+4} y={y(v)+4} fontSize="8" fill={C.muted}>{v}</text></g>
        ))}
        <path d={`${path("f")} L${x(data.length-1)},${H-pad} L${x(0)},${H-pad} Z`} fill="url(#gp)" opacity="0.6"/>
        <path d={`${path("r")} L${x(data.length-1)},${H-pad} L${x(0)},${H-pad} Z`} fill="url(#gg)" opacity="0.6"/>
        <path d={path("f")} fill="none" stroke={C.p600} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        <path d={path("r")} fill="none" stroke={C.g600} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {data.map((d,i)=>(
          <g key={i}>
            <circle cx={x(i)} cy={y(d.f)} r="4" fill={C.white} stroke={C.p600} strokeWidth="2"/>
            <circle cx={x(i)} cy={y(d.r)} r="4" fill={C.white} stroke={C.g600} strokeWidth="2"/>
            {!compact&&<text x={x(i)} y={H-4} textAnchor="middle" fontSize="9" fill={C.muted}>{d.d}</text>}
          </g>
        ))}
      </svg>
      {!compact&&(
        <div style={{display:"flex",gap:20,justifyContent:"center",marginTop:4}}>
          {[{c:C.p600,l:"Fasting"},{c:C.g600,l:"Random"}].map(({c,l})=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.mid}}>
              <div style={{width:20,height:3,borderRadius:2,background:c}}/>{l}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

            {mode==="login"&&<><span onClick={()=>setMode("register")} style={{color:C.p600,fontWeight:700,cursor:"pointer"}}>{t.register}</span>{" · "}<span onClick={()=>setMode("forgot")} style={{color:C.muted,cursor:"pointer"}}>{t.forgot}</span></>}
            {mode!=="login"&&<span onClick={()=>setMode("login")} style={{color:C.p600,fontWeight:700,cursor:"pointer"}}>← {t.login}</span>}
          </div>
        </div>
      </div>
    </div>
  );
};

  const [random,setRandom] = useState("");
  const [weight,setWeight] = useState("");
  const [sbp,setSbp] = useState("");
  const [dbp,setDbp] = useState("");
  const [exerciseMin,setExerciseMin] = useState("");
  const [readings,setReadings] = useState(OfflineStore.get("readings")||[]);
  const [vitals,setVitals] = useState(OfflineStore.get("vitals")||[]);
  const [missedDoses,setMissedDoses] = useState(OfflineStore.get("missed")||[]);
  const [chatMessages,setChatMessages] = useState([
    {from:"doctor",text:"Hello! I'm Dr. Ayenachew. How are you feeling today?",time:"09:00"},
  ]);
  const [chatInput,setChatInput] = useState("");
  const [pendingSync,setPendingSync] = useState(OfflineStore.get("pendingSync")||[]);

  const notify = (msg,type="ok") => {setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  useEffect(()=>{
    const handleOnline = () => {setOnline(true);simulateSync();};
    const handleOffline = () => setOnline(false);
    window.addEventListener("online",handleOnline);
    window.addEventListener("offline",handleOffline);
    return ()=>{window.removeEventListener("online",handleOnline);window.removeEventListener("offline",handleOffline);};
  },[]);

  const simulateSync = () => {
    setSyncing(true);
    setTimeout(()=>{setSyncing(false);OfflineStore.set("pendingSync",[]);setPendingSync([]);},2000);
  };

  const saveOffline = (key, data) => {
    if (!online) {
      const pending = [...pendingSync, {key,data,time:new Date().toISOString()}];
      setPendingSync(pending);
      OfflineStore.set("pendingSync", pending);
      notify(t.syncBanner, "warn");
    }
  };

  const logGlucose = () => {
    if(!fasting&&!random){notify("Enter at least one reading","error");return;}
    const entry = {date:new Date().toLocaleDateString(),time:new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),fasting:fasting||null,random:random||null,id:Date.now()};
    const newReadings = OfflineStore.push("readings", entry);
    setReadings(newReadings);
    saveOffline("readings", entry);
    setFasting("");setRandom("");
    notify("Reading saved! "+(!online?" (offline)":""));

  const logVitals = () => {
    const entry = {date:new Date().toLocaleDateString(),weight:weight||null,sbp:sbp||null,dbp:dbp||null,exerciseMin:exerciseMin||null,bmi:weight?(weight/(1.65*1.65)).toFixed(1):null,id:Date.now()};

    saveOffline("vitals",entry);
    setWeight("");setSbp("");setDbp("");setExerciseMin("");
    notify("Vitals saved!"+(!online?" (offline)":""));

  const logMissedDose = (med) => {
    const entry = {med,date:new Date().toLocaleDateString(),time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
    const newMissed = OfflineStore.push("missed",entry);
    setMissedDoses(newMissed);
    notify(t.missedLogged);
  };

  const sendRefill = (med) => notify(`${t.refillSent} — ${med}`);

  const sendChat = () => {
    if(!chatInput.trim()) return;
    const msg = {from:"patient",text:chatInput,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
    setChatMessages(prev=>[...prev,msg]);
    setChatInput("");
    setTimeout(()=>{

                <button key={f} onClick={()=>setFilter(f)} style={{padding:"7px 16px",borderRadius:18,border:"none",
                  background:filter===f?`linear-gradient(135deg,${C.p600},${C.p900})`:C.white,
                  color:filter===f?"#fff":C.mid,fontWeight:700,fontSize:12,cursor:"pointer",
                  fontFamily:"'Outfit',sans-serif",border:filter===f?"none":`1.5px solid ${C.border}`}}>

            <div className="fadeUp2" style={{background:C.white,borderRadius:18,border:`1.5px solid ${C.border}`,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>

                  <tr style={{background:C.bg}}>

                <tbody>

                    <tr key={p.id} style={{borderTop:`1px solid ${C.border}`,cursor:"pointer",transition:"background 0.15s"}}

                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                      onClick={()=>{setPatient(p);setPatientTab("overview");}}>
                      <td style={{padding:"12px 16px"}}><div style={{fontWeight:700,fontSize:13,color:C.dark}}>{p.name}</div><div style={{fontSize:11,color:C.muted}}>Age {p.age} · {p.gender} · {p.city}</div></td>
                      <td style={{padding:"12px 16px",fontSize:12,color:C.mid,fontWeight:600}}>{p.type}</td>
                      <td style={{padding:"12px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:32,height:32,borderRadius:"50%",background:riskBg(p.risk),display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:riskC(p.risk)}}>{p.score}</div>
                          <Pill label={p.risk.toUpperCase()} c={riskC(p.risk)} bg={riskBg(p.risk)}/>
                        </div>
                      </td>
                      <td style={{padding:"12px 16px"}}><span style={{fontSize:15,fontWeight:800,color:gStatus(p.glucose).c}}>{p.glucose}</span><span style={{fontSize:10,color:C.muted}}> mg/dL</span></td>
                      <td style={{padding:"12px 16px",fontSize:12,fontWeight:600,color:p.sbp>140?C.r500:C.mid}}>{p.sbp}/{p.dbp}</td>
                      <td style={{padding:"12px 16px",fontSize:13,fontWeight:700,color:p.hba1c>8?C.r500:p.hba1c>7?C.o500:C.g700}}>{p.hba1c}%</td>
                      <td style={{padding:"12px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:48,height:5,background:C.border,borderRadius:3}}>
                            <div style={{height:"100%",width:`${p.adherence}%`,background:p.adherence>70?C.g600:p.adherence>50?C.o500:C.r500,borderRadius:3}}/>
                          </div>
                          <span style={{fontSize:12,fontWeight:700,color:p.adherence>70?C.g700:p.adherence>50?C.o500:C.r500}}>{p.adherence}%</span>
                        </div>
                      </td>
                      <td style={{padding:"12px 16px"}}><Pill label={p.sub} c={p.sub==="premium"?C.g700:p.sub==="standard"?C.p600:C.muted} bg={p.sub==="premium"?C.g100:p.sub==="standard"?C.p100:C.bg}/></td>
                      <td style={{padding:"12px 16px"}}><button onClick={e=>{e.stopPropagation();setPatient(p);setPatientTab("overview");}} style={{background:C.p100,border:"none",color:C.p600,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>View →</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ── PATIENT DETAIL ── */}
        {patient&&(
          <div>
            <button onClick={()=>setPatient(null)} style={{background:"none",border:"none",color:C.p600,fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:20,fontFamily:"'Outfit',sans-serif",display:"flex",alignItems:"center",gap:6}}>← Back</button>

            {/* Patient header */}
            <div className="fadeUp" style={{background:`linear-gradient(135deg,${C.p900},${C.g800})`,borderRadius:20,padding:22,marginBottom:18,color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:14}}>
              <div style={{display:"flex",gap:16,alignItems:"center"}}>
                <div style={{width:56,height:56,borderRadius:"50%",background:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>👤</div>
                <div>
                  <h2 style={{fontSize:20,fontWeight:800,margin:0}}>{patient.name}</h2>
                  <p style={{margin:"3px 0 0",fontSize:13,opacity:0.7}}>{patient.type} · Age {patient.age} · {patient.city}</p>
                  <div style={{marginTop:6,display:"flex",gap:8,flexWrap:"wrap"}}>
                    <Pill label={`${calcRiskScore(patient).risk.toUpperCase()} RISK`} c={riskC(calcRiskScore(patient).risk)} bg="rgba(255,255,255,0.15)"/>
                    <Pill label={`Score: ${calcRiskScore(patient).score}/100`} c="#fff" bg="rgba(255,255,255,0.15)"/>
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>setSmsModal(patient)} v="outline" sz="sm" style={{color:"#fff",borderColor:"rgba(255,255,255,0.4)"}}>📱 SMS</Btn>
                <Btn onClick={()=>notify(t.apptBooked)} v="outline" sz="sm" style={{color:"#fff",borderColor:"rgba(255,255,255,0.4)"}}>📅 Book</Btn>
              </div>
            </div>

            {/* Patient sub-tabs */}
            <div style={{display:"flex",gap:6,marginBottom:18,overflowX:"auto",paddingBottom:4}}>
              {[["overview","📊 Overview"],["history","📋 History"],["investigations","🔬 Investigations"],["imaging","🖼️ Imaging"],["actions","⚡ Actions"]].map(([id,label])=>(
                <button key={id} onClick={()=>setPatientTab(id)} style={{padding:"8px 16px",borderRadius:12,border:"none",background:patientTab===id?`linear-gradient(135deg,${C.p600},${C.p900})`:C.white,color:patientTab===id?"#fff":C.mid,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Outfit',sans-serif",whiteSpace:"nowrap",border:patientTab===id?"none":`1.5px solid ${C.border}`}}>
                  {label}
                </button>
              ))}
            </div>

            {/* Overview tab */}
            {patientTab==="overview"&&(
              <div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:18}}>
                <div>
                  <div className="fadeUp" style={{background:C.white,borderRadius:18,padding:20,marginBottom:14,border:`1.5px solid ${C.border}`}}>
                    <h4 style={{fontSize:13,fontWeight:800,color:C.dark,margin:"0 0 14px",letterSpacing:0.5}}>VITALS SNAPSHOT</h4>
                    {[{l:"Glucose",v:`${patient.glucose} mg/dL`,c:gStatus(patient.glucose).c},{l:"HbA1c",v:`${patient.hba1c}%`,c:patient.hba1c>8?C.r500:patient.hba1c>7?C.o500:C.g700},{l:"Blood Pressure",v:`${patient.sbp}/${patient.dbp} mmHg`,c:patient.sbp>140?C.r500:C.g700},{l:"BMI",v:`${patient.bmi} kg/m²`,c:patient.bmi>30?C.r500:patient.bmi>27?C.o500:C.g700},{l:"Weight",v:`${patient.weight} kg`,c:C.p600},{l:"Adherence",v:`${patient.adherence}%`,c:patient.adherence>70?C.g600:patient.adherence>50?C.o500:C.r500}].map((s,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                        <span style={{fontSize:13,color:C.muted,fontWeight:600}}>{s.l}</span>
                        <span style={{fontSize:13,fontWeight:800,color:s.c}}>{s.v}</span>
                      </div>
                    ))}
                  </div>

                  {/* AI Risk Score Card */}
                  <div className="fadeUp1" style={{background:calcRiskScore(patient).risk==="high"?C.r50:calcRiskScore(patient).risk==="medium"?C.o50:C.g50,borderRadius:18,padding:18,border:`1.5px solid ${riskC(calcRiskScore(patient).risk)}30`,marginBottom:14}}>
                    <p style={{fontSize:11,fontWeight:700,letterSpacing:1,color:C.mid,marginBottom:6}}>🤖 {t.aiRec}</p>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                      <div style={{width:56,height:56,borderRadius:"50%",background:riskBg(calcRiskScore(patient).risk),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:`2px solid ${riskC(calcRiskScore(patient).risk)}`}}>
                        <span style={{fontSize:16,fontWeight:900,color:riskC(calcRiskScore(patient).risk)}}>{calcRiskScore(patient).score}</span>
                        <span style={{fontSize:8,color:riskC(calcRiskScore(patient).risk),fontWeight:700}}>/100</span>
                      </div>
                      <div>
                        <Pill label={calcRiskScore(patient).risk.toUpperCase()+" RISK"} c={riskC(calcRiskScore(patient).risk)} bg={riskBg(calcRiskScore(patient).risk)} size={13}/>
                        <p style={{margin:"6px 0 0",fontSize:12,color:C.dark,lineHeight:1.5}}>{aiRec(patient).msg}</p>
                      </div>
                    </div>
                    <div style={{fontSize:11,color:C.muted,lineHeight:1.6}}>
                      <strong>Score breakdown:</strong> Glucose ({patient.glucose>300?"+30":patient.glucose>200?"+20":"+10"}) + HbA1c ({patient.hba1c>9?"+25":patient.hba1c>8?"+15":"+8"}) + BP ({patient.sbp>160?"+20":patient.sbp>140?"+12":"+6"}) + Adherence ({patient.adherence<40?"+15":patient.adherence<60?"+8":"+3"})
                    </div>
                  </div>

                  {patient.alerts.length>0&&(
                    <div className="fadeUp2" style={{background:C.r50,borderRadius:18,padding:18,border:`1.5px solid ${C.r500}30`}}>
                      <h4 style={{color:C.r500,fontSize:13,fontWeight:800,margin:"0 0 10px"}}>🚨 Active Alerts</h4>
                      {patient.alerts.map((a,i)=>(
                        <div key={i} style={{fontSize:12,color:C.dark,padding:"5px 0",borderBottom:i<patient.alerts.length-1?`1px dashed ${C.r100}`:"none"}}>• {a}</div>
                      ))}
                    </div>
                  )}
                </div>

                <div>
                  <div className="fadeUp" style={{background:C.white,borderRadius:18,padding:20,marginBottom:14,border:`1.5px solid ${C.border}`}}>
                    <h3 style={{fontSize:15,fontWeight:800,color:C.dark,margin:"0 0 16px"}}>7-Day Glucose Trend</h3>
                    <Chart/>
                  </div>
                  <div className="fadeUp1" style={{background:C.white,borderRadius:18,padding:20,border:`1.5px solid ${C.border}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:16}}>
                      <Ring pct={patient.adherence} size={72} color={patient.adherence>70?C.g600:patient.adherence>50?C.o500:C.r500}/>
                      <div>
                        <p style={{margin:0,fontSize:14,fontWeight:700,color:C.dark}}>Medication Adherence</p>
                        <p style={{margin:"4px 0 0",fontSize:12,color:C.muted,lineHeight:1.5}}>{patient.adherence>70?"Good — continue current plan":patient.adherence>50?"Moderate — counseling recommended":"Poor — urgent intervention needed"}</p>
                        <p style={{margin:"4px 0 0",fontSize:11,color:C.muted}}>Phone: {patient.phone}</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* History tab */}
            {patientTab==="history"&&(
              <div>
                <div className="fadeUp" style={{background:C.white,borderRadius:18,padding:22,marginBottom:14,border:`1.5px solid ${C.border}`}}>
                  <h3 style={{fontSize:16,fontWeight:800,color:C.dark,margin:"0 0 18px"}}>📋 {t.patientHistory}</h3>
                  {patient.history.map((h,i)=>(
                    <div key={i} style={{padding:"14px 0",borderBottom:i<patient.history.length-1?`1px solid ${C.border}`:"none"}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                        <span style={{fontSize:13,fontWeight:800,color:C.p600}}>{h.date}</span>
                        <span style={{fontSize:12,color:C.muted}}>👨‍⚕️ {h.doctor}</span>
                      </div>
                      <p style={{margin:0,fontSize:14,color:C.dark,lineHeight:1.7}}>{h.note}</p>
                    </div>
                  ))}
                </div>
                <div className="fadeUp1" style={{background:C.white,borderRadius:18,padding:22,border:`1.5px solid ${C.border}`}}>
                  <h3 style={{fontSize:15,fontWeight:800,color:C.dark,margin:"0 0 14px"}}>➕ Add Clinical Note</h3>
                  <Field label="Clinical Note" value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Enter clinical observations, plan, medications..." rows={4}/>
                  <Btn onClick={()=>{if(newNote.trim()){notify(t.noteSaved);setNewNote("");}}} v="primary" sz="md" full>Save Note →</Btn>
                </div>
              </div>
            )}

            {/* Investigations tab */}
            {patientTab==="investigations"&&(
              <div>
                <div className="fadeUp" style={{background:C.white,borderRadius:18,padding:22,marginBottom:14,border:`1.5px solid ${C.border}`}}>
                  <h3 style={{fontSize:16,fontWeight:800,color:C.dark,margin:"0 0 18px"}}>🔬 {t.investigations}</h3>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{background:C.bg}}>
                        {["Date","Test","Result","Reference","Status"].map(h=>(
                          <th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:C.muted,letterSpacing:0.8}}>{h.toUpperCase()}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {patient.investigations.map((inv,i)=>(
                        <tr key={i} style={{borderTop:`1px solid ${C.border}`}}>
                          <td style={{padding:"12px 14px",fontSize:12,color:C.muted}}>{inv.date}</td>
                          <td style={{padding:"12px 14px",fontSize:13,fontWeight:700,color:C.dark}}>{inv.test}</td>
                          <td style={{padding:"12px 14px",fontSize:14,fontWeight:800,color:statusColor(inv.status)}}>{inv.result}</td>
                          <td style={{padding:"12px 14px",fontSize:12,color:C.muted}}>{inv.ref}</td>
                          <td style={{padding:"12px 14px"}}><Pill label={inv.status.toUpperCase()} c={statusColor(inv.status)} bg={statusBg(inv.status)}/></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="fadeUp1" style={{background:C.white,borderRadius:18,padding:22,border:`1.5px solid ${C.border}`}}>
                  <h3 style={{fontSize:15,fontWeight:800,color:C.dark,margin:"0 0 14px"}}>➕ Add Investigation Result</h3>
                  <Field label="Test Name (e.g. HbA1c, Fasting Glucose)" value={newInvResult.test} onChange={e=>setNewInvResult({...newInvResult,test:e.target.value})} placeholder="e.g. HbA1c" icon="🔬"/>
                  <Field label="Result" value={newInvResult.result} onChange={e=>setNewInvResult({...newInvResult,result:e.target.value})} placeholder="e.g. 8.5%" icon="📊"/>
                  <Field label="Reference Range" value={newInvResult.ref} onChange={e=>setNewInvResult({...newInvResult,ref:e.target.value})} placeholder="e.g. <7%" icon="📏"/>
                  <Btn onClick={()=>{if(newInvResult.test&&newInvResult.result){notify("Investigation result saved!");setNewInvResult({test:"",result:"",ref:""});}}} v="primary" sz="md" full>Save Result →</Btn>
                </div>
              </div>
            )}

            {/* Imaging tab */}
            {patientTab==="imaging"&&(
              <div>
                <div className="fadeUp" style={{background:C.white,borderRadius:18,padding:22,marginBottom:14,border:`1.5px solid ${C.border}`}}>
                  <h3 style={{fontSize:16,fontWeight:800,color:C.dark,margin:"0 0 18px"}}>🖼️ {t.imaging}</h3>
                  {patient.imaging.length===0?(
                    <div style={{textAlign:"center",padding:"32px 0",color:C.muted}}>
                      <div style={{fontSize:40,marginBottom:10}}>🖼️</div>
                      <p style={{fontSize:14}}>No imaging reports yet</p>
                    </div>
                  ):patient.imaging.map((img,i)=>(
                    <div key={i} style={{padding:"16px",background:C.bg,borderRadius:14,marginBottom:10,border:`1px solid ${C.border}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                        <span style={{fontSize:14,fontWeight:800,color:C.dark}}>🖼️ {img.type}</span>
                        <span style={{fontSize:12,color:C.muted}}>{img.date}</span>
                      </div>
                      <p style={{margin:"0 0 6px",fontSize:13,color:C.dark,lineHeight:1.6}}>{img.finding}</p>
                      <p style={{margin:0,fontSize:11,color:C.muted}}>Reported by: {img.reported}</p>
                    </div>
                  ))}
                </div>
                <div className="fadeUp1" style={{background:C.white,borderRadius:18,padding:22,border:`1.5px solid ${C.border}`}}>
                  <h3 style={{fontSize:15,fontWeight:800,color:C.dark,margin:"0 0 14px"}}>➕ {t.uploadImage}</h3>
                  <Field label="Imaging Type" value={newImaging.type} onChange={e=>setNewImaging({...newImaging,type:e.target.value})} placeholder="e.g. Chest X-Ray, Fundoscopy, Renal Ultrasound" icon="🖼️"/>
                  <Field label="Radiologist Finding" value={newImaging.finding} onChange={e=>setNewImaging({...newImaging,finding:e.target.value})} placeholder="Enter radiologist report finding..." rows={3}/>
                  <div style={{border:`2px dashed ${C.border}`,borderRadius:12,padding:20,textAlign:"center",background:C.bg,marginBottom:14}}>
                    <div style={{fontSize:28,marginBottom:6}}>📎</div>
                    <p style={{color:C.muted,fontSize:13,margin:"0 0 8px"}}>Attach image file (JPG, PNG, PDF)</p>
                    <button style={{padding:"8px 18px",background:C.p100,border:"none",color:C.p600,borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>Choose File</button>
                  </div>
                  <Btn onClick={()=>{if(newImaging.type&&newImaging.finding){notify("Imaging report saved!");setNewImaging({type:"",finding:""});}}} v="primary" sz="md" full>Save Report →</Btn>
                </div>
              </div>
            )}

            {/* Actions tab */}
            {patientTab==="actions"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                {[{l:"📅 Book Appointment",a:()=>notify(t.apptBooked),v:"ghost"},{l:"📱 Send SMS Reminder",a:()=>setSmsModal(patient),v:"ghost"},{l:"💊 Update Medications",a:()=>notify("Medication updated"),v:"ghost"},{l:"📊 Request Lab Work",a:()=>notify(t.labSent),v:"ghost"},{l:"🖼️ Request Imaging",a:()=>notify("Imaging request sent"),v:"ghost"},{l:"🚨 Flag as Emergency",a:()=>notify("Patient flagged!","warn"),v:"danger"},{l:"📤 Refer to Specialist",a:()=>notify("Referral sent"),v:"ghost"},{l:"📞 Call Patient",a:()=>notify("Opening phone..."),v:"ghost"}].map(a=>(
                  <button key={a.l} onClick={a.a} style={{padding:"16px",background:a.v==="danger"?C.r50:C.white,border:`1.5px solid ${a.v==="danger"?C.r500:C.border}`,borderRadius:14,color:a.v==="danger"?C.r500:C.dark,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"'Outfit',sans-serif",textAlign:"left",transition:"all 0.15s"}}
                    onMouseEnter={e=>{e.currentTarget.style.background=a.v==="danger"?C.r100:C.p50;e.currentTarget.style.borderColor=a.v==="danger"?C.r500:C.p400;}}
                    onMouseLeave={e=>{e.currentTarget.style.background=a.v==="danger"?C.r50:C.white;e.currentTarget.style.borderColor=a.v==="danger"?C.r500:C.border;}}>
                    {a.l}
                  </button>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── ANALYTICS ── */}
        {view==="anal
