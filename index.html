<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mizan Diabetes Care</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:#f0f6ff;min-height:100vh;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.fade{animation:fadeUp 0.4s ease both;}
.card{background:#fff;border-radius:18px;border:1.5px solid #cde2f5;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(10,80,160,0.05);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:12px;border:none;font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all 0.2s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,#1278d4,#0a3d6b);color:#fff;box-shadow:0 4px 14px rgba(18,120,212,0.3);}
.btn-green{background:linear-gradient(135deg,#14a854,#0a3d22);color:#fff;box-shadow:0 4px 14px rgba(20,168,84,0.3);}
.btn-outline{background:transparent;color:#1278d4;border:2px solid #1278d4;}
.btn-ghost{background:#eaf4ff;color:#0f67b8;}
.btn-full{width:100%;}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:10px;}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
input,textarea,select{font-family:'Outfit',sans-serif;width:100%;padding:12px 14px;border-radius:11px;border:1.5px solid #cde2f5;font-size:15px;color:#0d1f35;background:#f0f6ff;transition:border 0.2s;}
input:focus,textarea:focus{outline:none;border-color:#1278d4;background:#fff;}
label{display:block;margin-bottom:6px;font-size:13px;font-weight:700;color:#0d1f35;}
.field{margin-bottom:14px;}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #cde2f5;display:flex;z-index:50;max-width:500px;margin:0 auto;}
.tab-btn{flex:1;padding:8px 4px 6px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Outfit',sans-serif;}
.tab-icon{font-size:18px;}
.tab-label{font-size:9px;font-weight:700;letter-spacing:0.2px;}
.screen{max-width:500px;margin:0 auto;padding:16px 14px 88px;min-height:100vh;}
.header{background:linear-gradient(135deg,#0a3d6b,#0a3d22);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:40;max-width:500px;margin:0 auto;}
.toast{position:fixed;top:16px;right:16px;left:16px;max-width:380px;margin:0 auto;z-index:999;padding:14px 18px;border-radius:14px;color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px;animation:fadeUp 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.2);}
.modal-bg{position:fixed;inset:0;background:rgba(13,31,53,0.7);z-index:800;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#fff;border-radius:22px;padding:24px;width:100%;max-width:400px;animation:fadeUp 0.3s ease;max-height:90vh;overflow-y:auto;}
.offline-bar{background:#f0831a;color:#fff;padding:7px 14px;font-size:12px;font-weight:700;text-align:center;position:sticky;top:0;z-index:60;}
.risk-high{color:#e8344a;} .risk-med{color:#f0831a;} .risk-low{color:#14a854;}
.bg-high{background:#fde8eb;} .bg-med{background:#fef0e0;} .bg-low{background:#e8faf0;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.stat-box{background:#fff;border-radius:14px;padding:14px;border:1.5px solid #cde2f5;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#7a9bb5;background:#f0f6ff;letter-spacing:0.8px;}
td{padding:10px 12px;font-size:13px;border-top:1px solid #eaf4ff;}
.lang-toggle{display:flex;gap:4px;}
.lang-btn{padding:4px 10px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.6);font-weight:700;font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;}
.lang-btn.active{background:rgba(255,255,255,0.2);color:#fff;border-color:rgba(255,255,255,0.6);}
.chart-bar{display:flex;align-items:flex-end;gap:8px;height:120px;padding:0 4px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:6px 6px 0 0;transition:height 0.5s ease;}
.bar-label{font-size:10px;color:#7a9bb5;font-weight:600;}
.sidebar{width:200px;background:linear-gradient(180deg,#0a3d6b,#071a2e);min-height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;z-index:30;}
.main-content{margin-left:200px;padding:24px;min-height:100vh;}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:rgba(255,255,255,0.55);border:none;background:transparent;width:100%;font-family:'Outfit',sans-serif;text-align:left;border-left:3px solid transparent;margin-bottom:2px;transition:all 0.2s;}
.nav-item.active{background:rgba(255,255,255,0.13);color:#fff;border-left-color:#18c965;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:#fff;border-radius:16px;padding:18px;border:1.5px solid #cde2f5;}
.patient-row{border-top:1px solid #eaf4ff;cursor:pointer;transition:background 0.15s;}
.patient-row:hover{background:#f5faff;}
.risk-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-size:11px;font-weight:800;}
.progress-bar{height:5px;background:#eaf4ff;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;}
@media(max-width:640px){
  .sidebar{display:none;}
  .main-content{margin-left:0;padding:14px;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

// ── HELPERS ────────────────────────────────────────────────────────────────────
const t = () => T[state.lang];
const $  = id => document.getElementById(id);
const gStatus = v => v<70?{l:'LOW',c:'#e8344a',bg:'#fde8eb'}:v<=140?{l:'NORMAL',c:'#14a854',bg:'#e8faf0'}:v<=200?{l:'ELEVATED',c:'#f0831a',bg:'#fef0e0'}:{l:'HIGH',c:'e8344a',bg:'#fde8eb'};
const calcRisk = p => {
  let s=0;
  if(p.glucose>300)s+=30;else if(p.glucose>200)s+=20;else s+=10;
  if(p.hba1c>9)s+=25;else if(p.hba1c>8)s+=15;else s+=8;
  if(p.sbp>160)s+=20;else if(p.sbp>140)s+=12;else s+=6;
  if(p.bmi>30)s+=10;else if(p.bmi>27)s+=5;
  if(p.adherence<40)s+=15;else if(p.adherence<60)s+=8;else s+=3;
  return {score:s,risk:s>=60?'high':s>=30?'medium':'low'};
};
const riskC = r => r==='high'?'#e8344a':r==='medium'?'#f0831a':'#14a854';
const riskBg = r => r==='high'?'#fde8eb':r==='medium'?'#fef0e0':'#e8faf0';
const hour = new Date().getHours();
const greeting = () => hour<12?t().goodMorning:hour<17?t().goodAfternoon:t().goodEvening;

function notify(msg, type='ok') {
  state.toast = {msg, type};
  render();
  setTimeout(()=>{state.toast=null;render();}, 3000);
}

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ── CHART ──────────────────────────────────────────────────────────────────────
function miniChart() {
  const max=280, H=100, W=300, pad=20;
  const x=i=>pad+(i/6)*(W-pad*2);
  const y=v=>H-pad-(v/max)*(H-pad*2);
  const fp=WEEK.map((d,i)=>`${i===0?'M':'L'}${x(i)},${y(d.f)}`).join(' ');
  const rp=WEEK.map((d,i)=>`${i===0?'M':'L'}${x(i)},${y(d.r)}`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:110px">
    <defs><linearGradient id="gfp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1278d4" stop-opacity="0.2"/><stop offset="100%" stop-color="#1278d4" stop-opacity="0"/></linearGradient></defs>
    ${[70,140,200].map(v=>`<line x1="${pad}" y1="${y(v)}" x2="${W-pad}" y2="${y(v)}" stroke="#cde2f5" stroke-width="0.8" stroke-dasharray="4,4"/><text x="${W-pad+3}" y="${y(v)+4}" font-size="8" fill="#7a9bb5">${v}</text>`).join('')}
    <path d="${fp} L${x(6)},${H-pad} L${x(0)},${H-pad} Z" fill="url(#gfp)"/>
    <path d="${fp}" fill="none" stroke="#1278d4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${rp}" fill="none" stroke="#14a854" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${WEEK.map((d,i)=>`<circle cx="${x(i)}" cy="${y(d.f)}" r="3.5" fill="#fff" stroke="#1278d4" stroke-width="2"/><circle cx="${x(i)}" cy="${y(d.r)}" r="3.5" fill="#fff" stroke="#14a854" stroke-width="2"/><text x="${x(i)}" y="${H-4}" text-anchor="middle" font-size="9" fill="#7a9bb5">${d.d}</text>`).join('')}
  </svg>
  <div style="display:flex;gap:16px;justify-content:center;margin-top:4px">
    <span style="font-size:12px;color:#7a9bb5;display:flex;align-items:center;gap:4px"><span style="width:18px;height:3px;background:#1278d4;border-radius:2px;display:inline-block"></span>Fasting</span>
    <span style="font-size:12px;color:#7a9bb5;display:flex;align-items:center;gap:4px"><span style="width:18px;height:3px;background:#14a854;border-radius:2px;display:inline-block"></span>Random</span>
  </div>`;
}

// RENDER FUNCTIONS

function renderToast() {
  if(!state.toast) return '';

function logGlucose() {
  const f = $('gl-fasting')&&$('gl-fasting').value;
  const r = $('gl-random')&&$('gl-random').value;
  if(!f&&!r){notify('Enter at least one reading','error');return;}
  const entry={date:new Date().toLocaleDateString(),time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),fasting:f||null,random:r||null};
  state.readings.unshift(entry);
  localStorage.setItem('mz_readings',JSON.stringify(state.readings));
  notify('Reading saved!'+(state.online?'':' (offline)'));
  render();
}

function sendChat() {
  const inp = $('chat-input');
  if(!inp||!inp.value.trim()) return;
  const msg = {from:'patient',text:inp.value,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})};
  state.chatMsgs.push(msg);
  inp.value='';
  render();
  setTimeout(()=>{
    state.chatMsgs.push({from:'doctor',text:'Thank you. I will review and respond shortly.',time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
    render();
    const cm=$('chat-msgs');
    if(cm) cm.scrollTop=cm.scrollHeight;
  },1200);
}

            <td><span class="pill" style="background:${p.sub==='premium'?'#e8faf0':p.sub==='standard'?'#eaf4ff':'#f0f6ff'};color:${p.sub==='premium'?'#108242':p.sub==='standard'?'#1278d4':'#7a9bb5'}">${p.sub}</span></td>
            <td><button onclick="event.stopPropagation();setState({selectedPatient:${p.id},patientTab:'overview'})" style="background:#eaf4ff;border:none;color:#1278d4;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">View →</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

          ${[{l:'Glucose',v:p.glucose+' mg/dL',c:gStatus(p.glucose).c},{l:'HbA1c',v:p.hba1c+'%',c:p.hba1c>8?'#e8344a':p.hba1c>7?'#f0831a':'#14a854'},{l:'Blood Pressure',v:p.sbp+'/'+p.dbp+' mmHg',c:p.sbp>140?'#e8344a':'#14a854'},{l:'BMI',v:p.bmi+' kg/m²',c:p.bmi>30?'#e8344a':p.bmi>27?'#f0831a':'#14a854'},{l:'Weight',v:p.weight+' kg',c:'#1278d4'},{l:'Adherence',v:p.adherence+'%',c:p.adherence>70?'#14a854':p.adherence>50?'#f0831a':'#e8344a'}].map((s,i)=>`

            <span style="font-size:13px;font-weight:800;color:${s.c}">${s.v}</span>
          </div>`).join('')}
        </div>
        <div style="background:${riskBg(risk)};border-radius:16px;padding:16px;border:1.5px solid ${riskC(risk)}30;margin-bottom:12px" class="fade">

          <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px">
            <div style="width:48px;height:48px;border-radius:50%;background:${riskBg(risk)};border:2px solid ${riskC(risk)};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">

            </div>

        ${p.alerts.length>0?`<div style="background:#fff5f6;border-radius:14px;padding:14px;border:1.5px solid #fde8eb" class="fade">

            <span style="font-size:16px;font-weight:900;color:${p.adherence>70?'#14a854':p.adherence>50?'#f0831a':'#e8344a'}">${p.adherence}%</span>
          </div>
          <div>
            <p style="margin:0;font-size:14px;font-weight:700;color:#0d1f35">Medication Adherence</p>
            <p style="margin:4px 0 0;font-size:12px;color:#7a9bb5">${p.adherence>70?'Good — continue plan':p.adherence>50?'Moderate — counseling needed':'Poor — urgent intervention'}</p>
            <p style="margin:4px 0 0;font-size:11px;color:#7a9bb5">📞 ${p.phone}</p>
          </div>
        </div>

    </div>`;

  if(state.patientTab==='history') return `
    <div class="card fade">

          <span style="font-size:13px;font-weight:800;color:#1278d4">${h.date}</span>
          <span style="font-size:12px;color:#7a9bb5">👨‍⚕️ ${h.doctor}</span>

    <div class="card fade">
      <h3 style="font-size:15px;font-weight:800;color:#0d1f35;margin:0 0 12px">➕ Add Clinical Note</h3>

      <button class="btn btn-primary btn-full" onclick="if($('new-note')&&$('new-note').value.trim()){notify('Note saved.');$('new-note').value=''}">Save Note →</button>

  if(state.patientTab==='investigations') return `

        <thead><tr>${['Date','Test','Result','Reference','Status'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${p.investigations.map(inv=>`
          <tr>

            <td style="color:#7a9bb5;font-size:12px">${inv.ref}</td>
            <td><span class="pill" style="background:${inv.status==='high'?'#fde8eb':inv.status==='elevated'?'#fef0e0':'#e8faf0'};color:${inv.status==='high'?'#e8344a':inv.status==='elevated'?'#f0831a':'#14a854'}">${inv.status.toUpperCase()}</span></td>

  if(state.patientTab==='imaging') return `

        <p style="margin:0 0 4px;font-size:13px;color:#0d1f35;line-height:1.6">${img.finding}</p>
        <p style="margin:0;font-size:11px;color:#7a9bb5">Reported by: ${img.reported}</p>
      </div>`).join('')}

        <button class="btn btn-ghost btn-sm" onclick="notify('File upload coming in v1.0')">Choose File</button>
      </div>
      <button class="btn btn-primary btn-full" onclick="if($('img-type')&&$('img-type').value){notify('Imaging report saved!');['img-type','img-finding'].forEach(id=>{if($(id))$(id).value=''})}">Save Report →</button>
    </div>`;

  if(state.patientTab==='actions') return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px" class="fade">
      ${[['📅 Book Appointment',()=>notify('Appointment booked!'),'#eaf4ff','#0d1f35'],['📱 Send SMS',()=>notify('SMS sent to '+p.name),'#eaf4ff','#0d1f35'],['💊 Update Medications',()=>notify('Opening medication editor...'),'#eaf4ff','#0d1f35'],['📊 Request Lab Work',()=>notify('Lab request sent.'),'#eaf4ff','#0d1f35'],['🖼️ Request Imaging',()=>notify('Imaging request sent.'),'#eaf4ff','#0d1f35'],['📤 Refer to Specialist',()=>notify('Referral sent.'),'#eaf4ff','#0d1f35'],['📞 Call Patient',()=>notify('Opening phone...'),'#eaf4ff','#0d1f35'],['🚨 Flag Emergency',()=>notify('Patient flagged!','warn'),'#fff5f6','#e8344a']].map((a,i)=>`

    </div>`;

  return '';
}

function renderAnalytics() {
  const pw = PATIENTS.map(p=>({...p,...calcRisk(p)}));
  const rev = PATIENTS.reduce((s,p)=>s+(p.sub==='premium'?12:p.sub==='standard'?7:3),0);
  return `
    <div class="fade" style="margin-bottom:20px">
      <h1 style="font-size:24px;font-weight:900;color:#0d1f35;margin:0">Analytics</h1>
      <p style="color:#7a9bb5;font-size:13px;margin:3px 0 0">Clinic performance & patient insights</p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card fade">
        <h3 style="font-size:14px;font-weight:800;color:#0d1f35;margin:0 0 16px">Risk Distribution</h3>
        ${[{l:t().highRisk,n:pw.filter(p=>p.risk==='high').length,pct:50,c:'#e8344a'},{l:t().medRisk,n:pw.filter(p=>p.risk==='medium').length,pct:33,c:'#f0831a'},{l:t().lowRisk,n:pw.filter(p=>p.risk==='low').length,pct:17,c:'#14a854'}].map(r=>`
        <div style="margin-bottom:12px">

            <span style="font-size:13px;font-weight:700;color:#0d1f35">${r.l}</span>
            <span style="font-size:12px;font-weight:700;color:${r.c}">${r.n} (${r.pct}%)</span>

          <div class="progress-bar"><div class="progress-fill" style="width:${r.pct}%;background:${r.c}"></div></div>

        <h3 style="font-size:14px;font-weight:800;color:#0d1f35;margin:0 0 16px">Revenue</h3>
        ${[{p:'Premium ($12)',n:2,rev:24,c:'#108242'},{p:'Standard ($7)',n:2,rev:14,c:'#1278d4'},{p:'Basic ($3)',n:2,rev:6,c:'#7a9bb5'}].map((s,i,a)=>`
        <div style="display:flex;justify-content:space-between;padding:10px 0;${i<a.length-1?'border-bottom:1px solid #eaf4ff':''}">

          <span style="font-size:14px;font-weight:800;color:${s.c}">$${s.rev}/mo</span>
        </div>`).join('')}
        <div style="margin-top:12px;background:linear-gradient(135deg,#e8faf0,#eaf4ff);border-radius:10px;padding:12px;text-align:center">
          <p style="margin:0;font-size:12px;color:#7a9bb5">Total Monthly</p>
          <p style="margin:2px 0 0;font-size:26px;font-weight:900;color:#108242">$${rev}<span style="font-size:13px;color:#7a9bb5;font-weight:500">/mo</span></p>
        </div>
      </div>
    </div>
    <div class="card fade">
      <h3 style="font-size:14px;font-weight:800;color:#0d1f35;margin:0 0 14px">Patient Growth 2025</h3>
      <div class="chart-bar">
        ${[{m:'Jan',n:1},{m:'Feb',n:2},{m:'Mar',n:3},{m:'Apr',n:4},{m:'May',n:6}].map((d,i,a)=>`

          <div class="bar" style="height:${(d.n/6)*100}px;background:${i===a.length-1?'linear-gradient(180deg,#1278d4,#0a3d6b)':'linear-gradient(180deg,#d4ebfe,#a8d5fc)'}"></div>

      <div class="fade" style="background:#fff;border-radius:16px;padding:18px;margin-bottom:12px;border:1.5px solid ${p.risk==='high'?'#e8344a':p.risk==='medium'?'#f0831a':'#cde2f5'};border-left:5px solid ${riskC(p.risk)}">

              <span class="pill" style="background:${riskBg(p.risk)};color:${riskC(p.risk)}">${p.risk.toUpperCase()}</span>

            <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px">

              <span style="font-size:12px;color:#7a9bb5">HbA1c: <strong style="color:${p.hba1c>8?'#e8344a':'#14a854'}">${p.hba1c}%</strong></span>
              <span style="font-size:12px;color:#7a9bb5">BP: <strong style="color:${p.sbp>140?'#e8344a':'#14a854'}">${p.sbp}/${p.dbp}</strong></span>
              <span style="font-size:12px;color:#7a9bb5">Adh: <strong style="color:${p.adherence>70?'#14a854':'#e8344a'}">${p.adherence}%</strong></span>

            <div style="background:${p.risk==='high'?'#fff5f6':p.risk==='medium'?'#fffaf4':'#f4fdf7'};border-radius:9px;padding:8px 11px;display:inline-flex;gap:7px;align-items:flex-start">

            <button onclick="notify('Appointment booked!')" style="padding:7px 13px;background:#f0f6ff;border:1.5px solid #cde2f5;color:#7a9bb5;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">📅 Book</button>
          </div>
        </div>
      </div>`;}).join('')}`;
}

  let html = '';
  if(state.screen==='auth') html = renderAuth();
  else if(state.role==='patient') html = renderPatientApp();
  else html = renderClinic();
  document.getElementById('app').innerHTML = html + renderToast();
  // scroll chat to bottom
  const cm = document.getElementById('chat-msgs');
  if(cm) cm.scrollTop = cm.scrollHeight;
}

// initial render
render();
</script>
</body>
</html>
