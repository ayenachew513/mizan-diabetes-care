<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mizan Diabetes Care</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Outfit, sans-serif; background: #f0f6ff; min-height: 100vh; }
    button, input, textarea, select { font-family: Outfit, sans-serif; }
    input:focus, textarea:focus, select:focus { outline: 2px solid #1278d4; outline-offset: 1px; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: #b8d4ee; border-radius: 3px; }
    .app-shell { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #f0f6ff; }
    .card { background: #fff; border: 1.5px solid #d3e5f0; border-radius: 16px; padding: 16px; }
    .btn { width: 100%; border: none; border-radius: 12px; padding: 11px 14px; font-weight: 700; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg,#1278d4,#1e4a85); color: #fff; }
    .btn-soft { background: #eaf4ff; color: #1278d4; }
    .btn-danger { background: #fde8eb; color: #b32636; }
    .btn-success { background: #e9f8ef; color: #1f8a4c; }
    .field { width: 100%; padding: 11px 13px; border-radius: 11px; border: 1.5px solid #d3e5f0; background: #f0f6ff; font-size: 15px; }
    .label { display:block; margin-bottom: 5px; font-size: 13px; font-weight: 700; color: #0d1f35; }
    .row { display:flex; gap:10px; }
    .row > * { flex: 1; }
    .topbar { background: linear-gradient(135deg,#1e4a85,#2c8ef2); color:#fff; padding: 14px 16px; display:flex; justify-content:space-between; align-items:center; position: sticky; top: 0; z-index: 20; }
    .tabs { display:flex; gap:8px; overflow-x:auto; border-bottom: 1px solid #d3e5f0; background:#fff; padding: 8px 10px; position: sticky; top: 56px; z-index: 19; }
    .tab { border:none; background:transparent; padding: 8px 10px; font-weight:700; color:#607086; border-bottom: 3px solid transparent; cursor:pointer; white-space:nowrap; }
    .tab.active { color:#1278d4; border-bottom-color:#1278d4; }
    .pill { display:inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 800; }
    .pill-high { background:#fde8eb; color:#b32636; }
    .pill-medium { background:#fff1df; color:#ad5b00; }
    .pill-low { background:#e9f8ef; color:#1f8a4c; }
    .muted { color:#66758a; }
    .screen { padding: 16px; }
    .hidden { display:none !important; }
    .toast { position: fixed; top: 16px; right: 16px; z-index: 9999; padding: 12px 14px; border-radius: 12px; color:#fff; font-weight:700; box-shadow: 0 10px 28px rgba(0,0,0,.18); }
    .toast.ok { background:#1f8a4c; }
    .toast.err { background:#b32636; }
    .toast.warn { background:#ad5b00; }
    .chatbox { max-height: 280px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding: 12px; }
    .msg { max-width: 80%; padding: 9px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .msg.me { align-self:flex-end; background: linear-gradient(135deg,#1278d4,#1e4a85); color:#fff; }
    .msg.them { align-self:flex-start; background:#f0f6ff; color:#0d1f35; }
    .offline { background:#ad5b00; color:#fff; text-align:center; padding: 8px 12px; font-size: 12px; font-weight: 700; }
    .small { font-size: 12px; }
    .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid3 { display:grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .grid4 { display:grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
    .stat { background:#fff; border:1.5px solid #d3e5f0; border-radius:14px; padding:14px; }
    .stat .n { font-size: 24px; font-weight: 900; color:#0d1f35; }
    .stat .l { font-size: 11px; font-weight: 700; color:#607086; }
    .logo { font-weight: 900; letter-spacing: .5px; }
    .center { text-align:center; }
    .section-title { font-size: 22px; font-weight: 900; color:#0d1f35; margin-bottom: 12px; }
    .sp8 { height: 8px; }
    .sp12 { height: 12px; }
    .sp16 { height: 16px; }
    .sp20 { height: 20px; }
  </style>
</head>
<body>
  <div id="offlineBanner" class="offline hidden">Offline mode: changes will sync when connection returns.</div>
  <div id="toastRoot"></div>

  <div id="app" class="app-shell"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, getDocs, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const ADMIN_EMAIL = "ayenachewn1@gmail.com";
    const PLAN_PRICES = { basic: 3, standard: 7, premium: 12 };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const STATE = {
      user: null,
      profile: null,
      role: "patient",
      lang: "en",
      patientTab: "home",
      clinicTab: "overview",
      online: navigator.onLine,
      paymentPlan: "basic"
    };

    const T = {
      en: {
        appName: "Mizan Diabetes Care",
        login: "Sign In",
        register: "Create Account",
        logout: "Sign Out",
        patient: "Patient",
        doctor: "Clinic Doctor",

        approvePending: "Waiting for approval",
        accessLocked: "Your access is locked until payment is approved.",
        submitPayment: "Submit Payment",
        basic: "Basic",
        standard: "Standard",

        diastolic: "Diastolic mmHg",
        exercise: "Exercise min",
        save: "Save",
        chatConsult: "Consultation Chat",
        typeMsg: "Type a message...",
        send: "Send",
        offline: "Offline saved locally",
        syncing: "Syncing...",
        approved: "Approved",
        pending: "Pending",
        rejected: "Rejected"
      },
      am: {
        appName: "ሚዛን የስኳር እንክብካቤ",
        login: "ግባ",
        register: "መለያ ፍጠር",
        logout: "ውጣ",
        patient: "ታካሚ",
        doctor: "ዶክተር",
        name: "ሙሉ ስም",
        sex: "ጾታ",
        age: "ዕድሜ",
        city: "ከተማ",
        diabetesType: "የስኳር አይነት",
        email: "ኢሜይል",
        password: "የይለፍ ቃል",
        phone: "ስልክ",
        loginTitle: "እንኳን ደህና መጡ",
        registerTitle: "መለያዎን ይፍጠሩ",
        enrollDoctor: "የዶክተር መመዝገቢያ",
        choosePlan: "ፕላን ይምረጡ",
        uploadScreenshot: "የTelebirr ስክሪንሾት ስቀል",
        approvePending: "ማጽደቅ በመጠባበቅ ላይ",
        accessLocked: "ክፍያ እስኪጸድቅ ድረስ መዳረሻ ተቆልፏል።",
        submitPayment: "ክፍያ ላክ",
        basic: "መሠረታዊ",
        standard: "መደበኛ",
        premium: "ፕሪሚየም",
        overview: "አጠቃላይ",
        patients: "ታካሚዎች",
        analytics: "ትንታኔ",
        followup: "ክትትል",
        home: "መነሻ",
        glucose: "ስኳር",
        vitals: "ምልክቶች",
        meds: "መድሀኒት",
        visits: "ጉብኝቶች",
        chat: "መልዕክት",
        learn: "ትምህርት",
        fasting: "የጾም mg/dL",
        random: "የዘፈቀደ mg/dL",
        weight: "ክብደት kg",
        systolic: "Systolic mmHg",
        diastolic: "Diastolic mmHg",
        exercise: "የእንቅስቃሴ ደቂቃ",
        save: "አስቀምጥ",
        chatConsult: "የምክክር መልዕክት",
        typeMsg: "መልዕክት ያስገቡ...",
        send: "ላክ",
        offline: "ኦፍላይን በአካባቢ ተቀምጧል",
        syncing: "በመስመር ላይ በመላክ ላይ...",
        approved: "ጸድቋል",
        pending: "በመጠባበቅ ላይ",
        rejected: "ተቋርጧል"
      }
    };

    const el = (tag, attrs = {}, ...children) => {
      const node = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === "class") node.className = v;
        else if (k === "html") node.innerHTML = v;
        else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2), v);
        else if (k === "style" && typeof v === "object") Object.assign(node.style, v);
        else node.setAttribute(k, v);
      }
      children.flat().forEach(c => node.appendChild(typeof c === "string" ? document.createTextNode(c) : c));
      return node;
    };

    const toast = (msg, type = "ok") => {
      const n = el("div", { class: `toast ${type}` }, msg);
      document.getElementById("toastRoot").appendChild(n);
      setTimeout(() => n.remove(), 3000);
    };

    const t = () => T[STATE.lang];

    function showOffline() {
      document.getElementById("offlineBanner").classList.toggle("hidden", STATE.online);
    }

    window.addEventListener("online", () => { STATE.online = true; showOffline(); render(); });
    window.addEventListener("offline", () => { STATE.online = false; showOffline(); render(); });

    async function saveDoc(col, id, data) {
      return setDoc(doc(db, col, id), data, { merge: true });
    }

    async function loadDoc(col, id) {
      const snap = await getDoc(doc(db, col, id));
      return snap.exists() ? snap.data() : null;
    }

    async function add(col, data) {
      return addDoc(collection(db, col), { ...data, createdAt: serverTimestamp() });
    }

    async function syncProfileFromAuth(u) {
      let p = await loadDoc("users", u.uid);
      if (!p) {
        p = {
          uid: u.uid,
          email: u.email,
          role: "patient",
          name: u.email.split("@")[0],
          paymentStatus: "none",
          plan: "basic",
          accessGranted: false,
          createdAt: Date.now()
        };
        await saveDoc("users", u.uid, p);
      }
      if (u.email === ADMIN_EMAIL) {
        p.role = "doctor";
        p.paymentStatus = "approved";
        p.accessGranted = true;
        await saveDoc("users", u.uid, p);
      }
      STATE.profile = p;
      STATE.role = p.role || "patient";
      render();
    }

    onAuthStateChanged(auth, async (u) => {
      STATE.user = u || null;
      if (!u) {
        STATE.profile = null;
        render();
        return;
      }
      await syncProfileFromAuth(u);
    });

    async function handleRegister(form, role) {
      const cred = await createUserWithEmailAndPassword(auth, form.email, form.password);
      await saveDoc("users", cred.user.uid, {
        uid: cred.user.uid,
        email: form.email,
        role,
        name: form.name || "",
        sex: form.sex || "",
        age: form.age || "",
        city: form.city || "",
        diabetesType: form.diabetesType || "",
        phone: form.phone || "",
        paymentStatus: role === "patient" ? "none" : "approved",
        plan: "basic",
        accessGranted: role !== "patient",
        createdAt: Date.now()
      });
      await syncProfileFromAuth(cred.user);
    }

    async function handleLogin(email, password) {
      await signInWithEmailAndPassword(auth, email, password);
    }

    function langToggle() {
      return el("div", { style: { display: "flex", gap: "6px" } },
        el("button", { class: "btn btn-soft", style: { width: "auto", padding: "6px 10px" }, onclick: () => { STATE.lang = "en"; render(); } }, "EN"),
        el("button", { class: "btn btn-soft", style: { width: "auto", padding: "6px 10px" }, onclick: () => { STATE.lang = "am"; render(); } }, "አማ")
      );
    }

    function authScreen() {
      let mode = "login";
      let role = "patient";
      const form = { name:"", sex:"", age:"", city:"", diabetesType:"", phone:"", email:"", password:"" };

      return el("div", { class: "screen" },
        el("div", { class: "card" },
          el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" } },
            el("div", { class: "logo" }, t().appName),
            langToggle()
          ),
          el("div", { class: "row" },
            el("button", { class: "btn btn-primary", onclick: () => { role = "patient"; render(); } }, t().patient),
            el("button", { class: "btn btn-soft", onclick: () => { role = "doctor"; render(); } }, t().doctor)
          ),
          el("div", { class: "sp12" }),
          el("h2", { class: "section-title center" }, mode === "login" ? t().loginTitle : t().registerTitle),

          mode === "register" && role === "patient" ? el("div",
            el("label", { class: "label" }, t().name), el("input", { class: "field", onchange: e => form.name = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().sex), el("select", { class: "field", onchange: e => form.sex = e.target.value },
              el("option", { value: "" }, "--"),
              el("option", { value: "Male" }, "Male"),
              el("option", { value: "Female" }, "Female")
            ),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().age), el("input", { class: "field", type: "number", onchange: e => form.age = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().city), el("input", { class: "field", onchange: e => form.city = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().diabetesType), el("input", { class: "field", onchange: e => form.diabetesType = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().phone), el("input", { class: "field", onchange: e => form.phone = e.target.value })
          ) : null,

          mode === "register" && role === "doctor" ? el("div",
            el("label", { class: "label" }, t().name), el("input", { class: "field", onchange: e => form.name = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().phone), el("input", { class: "field", onchange: e => form.phone = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().city), el("input", { class: "field", onchange: e => form.city = e.target.value })
          ) : null,

          el("div", { class: "sp8" }),
          el("label", { class: "label" }, t().email), el("input", { class: "field", type:"email", onchange: e => form.email = e.target.value }),
          el("div", { class: "sp8" }),
          el("label", { class: "label" }, t().password), el("input", { class: "field", type:"password", onchange: e => form.password = e.target.value }),
          el("div", { class: "sp12" }),
          el("button", { class: "btn btn-primary", onclick: async () => {
            try {
              if (mode === "login") await handleLogin(form.email, form.password);
              else await handleRegister(form, role);
            } catch (e) {
              toast(e.message || "Auth failed", "err");
            }
          } }, mode === "login" ? t().login : t().register),
          el("div", { class: "sp12" }),
          el("button", { class: "btn btn-soft", onclick: () => { mode = mode === "login" ? "register" : "login"; render(); } }, mode === "login" ? t().register : t().login)
        )
      );
    }

    function paymentGate() {
      const p = STATE.profile || {};
      let plan = p.plan || "basic";
      let file = null;

      return el("div", { class: "screen" },
        el("div", { class: "card" },
          el("h2", { class: "section-title" }, t().choosePlan),
          el("p", { class: "muted" }, t().accessLocked),
          el("div", { class: "sp12" }),
          ["basic","standard","premium"].map(k =>
            el("div", {
              style: {
                border: plan === k ? "2px solid #1278d4" : "1.5px solid #d3e5f0",
                borderRadius: "14px",
                padding: "12px",
                marginBottom: "10px",
                background:"#fff"
              }
            },
              el("label", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" } },
                el("span", null, el("strong", null, T[STATE.lang][k]), ` — $${PLAN_PRICES[k]}`),
                el("input", {
                  type: "radio",
                  name: "plan",
                  checked: plan === k,
                  onchange: () => { plan = k; STATE.paymentPlan = k; render(); }
                })
              )
            )
          ),
          el("div", { class: "sp8" }),
          el("label", { class: "label" }, t().uploadScreenshot),
          el("input", {
            class: "field",
            type: "file",
            accept: "image/*",
            capture: "environment",
            onchange: e => { file = e.target.files[0]; }
          }),
          el("div", { class: "sp12" }),
          el("button", {
            class: "btn btn-primary",
            onclick: async () => {
              if (!file) return toast("Upload screenshot first", "warn");
              await add("paymentRequests", {
                uid: STATE.user.uid,
                email: STATE.user.email,
                name: p.name || "",
                role: "patient",
                plan,
                price: PLAN_PRICES[plan],
                status: "pending",
                screenshotName: file.name,
                paymentMethod: "Telebirr",
                createdAtMs: Date.now()
              });
              await saveDoc("users", STATE.user.uid, {
                paymentStatus: "pending",
                selectedPlan: plan,
                selectedPlanPrice: PLAN_PRICES[plan],
                accessGranted: false
              });
              toast(t().approvePending, "warn");
              STATE.profile = await loadDoc("users", STATE.user.uid);
              render();
            }
          }, t().submitPayment)
        )
      );
    }

    function topBar() {
      return el("div", { class: "topbar" },
        el("div", null,
          el("div", { class: "logo" }, t().appName),
          el("div", { class: "small", style: { opacity: ".8" } }, STATE.profile?.name || "")
        ),
        el("div", { style: { display:"flex", gap:"8px", alignItems:"center" } },
          langToggle(),
          el("button", { class: "btn btn-soft", style: { width:"auto", padding:"7px 10px" }, onclick: async () => signOut(auth) }, t().logout)
        )
      );
    }

    function tabs() {
      const items = STATE.role === "doctor"
        ? [["overview", t().overview], ["patients", t().patients], ["analytics", t().analytics], ["followup", t().followup]]
        : [["home", t().home], ["glucose", t().glucose], ["vitals", t().vitals], ["meds", t().meds], ["visits", t().visits], ["chat", t().chat], ["learn", t().learn]];
      return el("div", { class: "tabs" },
        ...items.map(([id, label]) => el("button", {
          class: `tab ${STATE.role === "doctor" ? STATE.clinicTab === id : STATE.patientTab === id ? "active" : ""}`,
          onclick: () => { if (STATE.role === "doctor") STATE.clinicTab = id; else STATE.patientTab = id; render(); }
        }, label))
      );
    }

    function riskScore(p) {
      let s = 0;
      const g = Number(p.glucose || 0);
      const h = Number(p.hba1c || 0);
      const bp = Number(p.sbp || 0);
      const bmi = Number(p.bmi || 0);
      const adh = Number(p.adherence || 100);
      if (g >= 300) s += 30; else if (g >= 200) s += 20; else if (g >= 140) s += 10;
      if (h >= 9) s += 25; else if (h >= 8) s += 15; else if (h >= 7) s += 8;
      if (bp >= 160) s += 20; else if (bp >= 140) s += 12; else if (bp >= 130) s += 6;
      if (bmi >= 30) s += 10; else if (bmi >= 27) s += 5;
      if (adh < 40) s += 15; else if (adh < 60) s += 8; else if (adh < 75) s += 3;
      return { score: s, level: s >= 60 ? "high" : s >= 30 ? "medium" : "low" };
    }

    async function patientHomeInner() {
      const p = STATE.profile || {};
      const rc = riskScore(p);
      return el("div", { class: "screen" },
        el("div", { class: "card" },
          el("h2", { class: "section-title" }, `Hi, ${p.name || "Patient"}`),
          el("p", { class: "muted" }, new Date().toDateString()),
          el("div", { class: "sp12" }),
          el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center" } },
            el("div", null, el("div", { style: { fontSize:"38px", fontWeight:"900" } }, p.latestGlucose || "--"), el("div", { class: "muted small" }, "mg/dL")),
            el("div", null, el("span", { class: `pill ${rc.level === 'high' ? 'pill-high' : rc.level === 'medium' ? 'pill-medium' : 'pill-low'}` }, rc.level.toUpperCase()))
          )
        ),
        el("div", { class: "sp12" }),
        el("div", { class: "card" },
          el("div", { class: "small muted" }, "AI Risk Stratification"),
          el("div", { style: { fontSize:"24px", fontWeight:"900" } }, `${rc.score}`),
          el("div", { class: "muted" }, `Risk: ${rc.level}`)
        )
      );
    }

    function patientGlucose() {
      let fasting = "", random = "";
      return el("div", { class: "screen" },
        el("h2", { class: "section-title" }, t().glucose),
        el("div", { class: "card" },
          el("label", { class: "label" }, t().fasting), el("input", { class: "field", type:"number", oninput: e => fasting = e.target.value, placeholder:"126" }),
          el("div", { class: "sp8" }),
          el("label", { class: "label" }, t().random), el("input", { class: "field", type:"number", oninput: e => random = e.target.value, placeholder:"180" }),
          el("div", { class: "sp12" }),
          el("button", { class: "btn btn-primary", onclick: async () => {
            await add(`users/${STATE.user.uid}/glucose`, {
              fasting: fasting ? Number(fasting) : null,
              random: random ? Number(random) : null,
              createdAtMs: Date.now()
            });
            toast("Saved");
          } }, t().save)
        )
      );
    }

    function patientVitals() {
      let weight = "", sbp = "", dbp = "", exercise = "";
      return el("div", { class: "screen" },
        el("h2", { class: "section-title" }, t().vitals),
        el("div", { class: "card" },
          el("label", { class: "label" }, t().weight), el("input", { class: "field", type:"number", oninput: e => weight = e.target.value }),
          el("div", { class: "sp8" }),
          el("label", { class: "label" }, t().systolic), el("input", { class: "field", type:"number", oninput: e => sbp = e.target.value }),
          el("div", { class: "sp8" }),
          el("label", { class: "label" }, t().diastolic), el("input", { class: "field", type:"number", oninput: e => dbp = e.target.value }),
          el("div", { class: "sp8" }),
          el("label", { class: "label" }, t().exercise), el("input", { class: "field", type:"number", oninput: e => exercise = e.target.value }),
          el("div", { class: "sp12" }),
          el("button", { class: "btn btn-primary", onclick: async () => {
            await add(`users/${STATE.user.uid}/vitals`, {
              weight: weight ? Number(weight) : null,
              sbp: sbp ? Number(sbp) : null,
              dbp: dbp ? Number(dbp) : null,
              exerciseMin: exercise ? Number(exercise) : null,
              createdAtMs: Date.now()
            });
            toast("Saved");
          } }, t().save)
        )
      );
    }

    function patientMeds() {
      return el("div", { class: "screen" },
        el("h2", { class: "section-title" }, t().meds),
        el("div", { class: "card" }, "Medication list, missed dose, refill request, and reminders can be connected here.")
      );
    }

    function patientVisits() {
      return el("div", { class: "screen" },
        el("h2", { class: "section-title" }, t().visits),
        el("div", { class: "card" }, "Appointments and follow-up visits will appear here.")
      );
    }

    function patientChat() {
      let msg = "";
      return el("div", { class: "screen" },
        el("h2", { class: "section-title" }, t().chatConsult),
        el("div", { class: "card" },
          el("div", { class: "chatbox" },
            el("div", { class: "msg them" }, "Hello! I am Dr. Ayenachew. How are you feeling today?")
          ),
          el("div", { class: "sp8" }),
          el("textarea", { class: "field", rows: 2, placeholder: t().typeMsg, oninput: e => msg = e.target.value }),
          el("div", { class: "sp8" }),
          el("button", { class: "btn btn-primary", onclick: async () => {
            if (!msg.trim()) return;
            await add(`users/${STATE.user.uid}/chat`, { from: "patient", text: msg, createdAtMs: Date.now() });
            toast("Sent");
          } }, t().send)
        )
      );
    }

    function patientLearn() {
      return el("div", { class: "screen" },
        el("h2", { class: "section-title" }, t().learn),
        el("div", { class: "card" }, "Education content cards go here.")
      );
    }

    async function patientView() {
      const p = STATE.profile || {};
      const wrap = el("div");
      wrap.appendChild(topBar());
      wrap.appendChild(tabs());
      if (p.paymentStatus !== "approved") {
        wrap.appendChild(paymentGate());
        return wrap;
      }
      const tab = STATE.patientTab;
      if (tab === "home") wrap.appendChild(await patientHomeInner());
      else if (tab === "glucose") wrap.appendChild(patientGlucose());
      else if (tab === "vitals") wrap.appendChild(patientVitals());
      else if (tab === "meds") wrap.appendChild(patientMeds());
      else if (tab === "visits") wrap.appendChild(patientVisits());
      else if (tab === "chat") wrap.appendChild(patientChat());
      else if (tab === "learn") wrap.appendChild(patientLearn());
      return wrap;
    }

    async function clinicView() {
      return el("div", { class: "screen" },
        topBar(),
        tabs(),
        el("div", { class: "card" },
          el("h2", { class: "section-title" }, "Clinic Dashboard"),
          el("p", { class: "muted" }, "All doctors can see all patients."),
          el("div", { class: "sp12" }),
          el("div", { class: "grid4" },
            el("div", { class: "stat" }, el("div", { class: "n" }, "0"), el("div", { class: "l" }, "Patients")),
            el("div", { class: "stat" }, el("div", { class: "n" }, "0"), el("div", { class: "l" }, "High Risk")),
            el("div", { class: "stat" }, el("div", { class: "n" }, "0"), el("div", { class: "l" }, "Approved")),
            el("div", { class: "stat" }, el("div", { class: "n" }, "0"), el("div", { class: "l" }, "Pending"))
          )
        )
      );
    }

    function renderAuth() {
      let mode = "login";
      let role = "patient";
      const form = { name:"", sex:"", age:"", city:"", diabetesType:"", phone:"", email:"", password:"" };

      return el("div", { class: "screen" },
        el("div", { class: "card" },
          el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" } },
            el("div", { class: "logo" }, t().appName),
            langToggle()
          ),
          el("div", { class: "row" },
            el("button", { class: "btn btn-primary", onclick: () => { role = "patient"; render(); } }, t().patient),
            el("button", { class: "btn btn-soft", onclick: () => { role = "doctor"; render(); } }, t().doctor)
          ),
          el("div", { class: "sp12" }),
          el("h2", { class: "section-title center" }, mode === "login" ? t().loginTitle : t().registerTitle),

          mode === "register" && role === "patient" ? el("div",
            el("label", { class: "label" }, t().name), el("input", { class: "field", onchange: e => form.name = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().sex), el("select", { class: "field", onchange: e => form.sex = e.target.value },
              el("option", { value: "" }, "--"),
              el("option", { value: "Male" }, "Male"),
              el("option", { value: "Female" }, "Female")
            ),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().age), el("input", { class: "field", type: "number", onchange: e => form.age = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().city), el("input", { class: "field", onchange: e => form.city = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().diabetesType), el("input", { class: "field", onchange: e => form.diabetesType = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().phone), el("input", { class: "field", onchange: e => form.phone = e.target.value })
          ) : null,

          mode === "register" && role === "doctor" ? el("div",
            el("label", { class: "label" }, t().name), el("input", { class: "field", onchange: e => form.name = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().phone), el("input", { class: "field", onchange: e => form.phone = e.target.value }),
            el("div", { class: "sp8" }),
            el("label", { class: "label" }, t().city), el("input", { class: "field", onchange: e => form.city = e.target.value })
          ) : null,

          el("div", { class: "sp8" }),
          el("label", { class: "label" }, t().email), el("input", { class: "field", type:"email", onchange: e => form.email = e.target.value }),
          el("div", { class: "sp8" }),
          el("label", { class: "label" }, t().password), el("input", { class: "field", type:"password", onchange: e => form.password = e.target.value }),
          el("div", { class: "sp12" }),
          el("button", { class: "btn btn-primary", onclick: async () => {
            try {
              if (mode === "login") await handleLogin(form.email, form.password);
              else await handleRegister(form, role);
            } catch (e) {
              toast(e.message || "Auth failed", "err");
            }
          } }, mode === "login" ? t().login : t().register),
          el("div", { class: "sp12" }),
          el("button", { class: "btn btn-soft", onclick: () => { mode = mode === "login" ? "register" : "login"; render(); } }, mode === "login" ? t().register : t().login)
        )
      );
    }

    function render() {
      showOffline();
      const root = document.getElementById("app");
      root.innerHTML = "";

      if (!STATE.user) {
        root.appendChild(renderAuth());
        return;
      }

      if (STATE.role === "patient") {
        patientView().then(v => {
          root.innerHTML = "";
          root.appendChild(v);
        });
      } else {
        clinicView().then(v => {
          root.innerHTML = "";
          root.appendChild(v);
        });
      }
    }

    render();
  </script>
</body>
</html>
