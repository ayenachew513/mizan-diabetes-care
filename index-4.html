function risk(p){
  let s=0;
  if(p.glucose>300)s+=30;else if(p.glucose>200)s+=20;else if(p.glucose>140)s+=10;
  if(p.hba1c>9)s+=25;else if(p.hba1c>8)s+=15;else if(p.hba1c>7)s+=8;
  if(p.sbp>160)s+=20;else if(p.sbp>140)s+=12;else if(p.sbp>130)s+=6;
  if(p.bmi>30)s+=10;else if(p.bmi>27)s+=5;
  if(p.adherence<40)s+=15;else if(p.adherence<60)s+=8;else if(p.adherence<75)s+=3;
  return{score:s,level:s>=60?"high":s>=30?"medium":"low"};
}
function gSt(v){
  if(v<70)return{label:"LOW",c:C.r5,bg:C.r1};
  if(v<=140)return{label:"NORMAL",c:C.g7,bg:C.g1};
  if(v<=200)return{label:"ELEVATED",c:C.o5,bg:C.o1};
  return{label:"HIGH",c:C.r5,bg:C.r1};
}
function rC(r){return r==="high"?C.r5:r==="medium"?C.o5:C.g6;}
function rBg(r){return r==="high"?C.r1:r==="medium"?C.o1:C.g1;}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
}

    display:"flex",gap:"10px",alignItems:"center",maxWidth:"280px",animation:"fadeUp .3s ease"}},
    icons[type]," ",msg,
    h("button",{onClick:()=>t.remove(),style:{background:"none",border:"none",color:"rgba(255,255,255,.8)",fontSize:"18px",marginLeft:"4px"}},"×")

  document.body.appendChild(t);
  setTimeout(()=>t.remove&&t.remove(),3500);
}

function btn(label,onClick,opts={}){
  const{v="primary",full=false,sm=false,disabled=false}=opts;
  const styles={
    primary:{background:`linear-gradient(135deg,${C.p6},${C.p9})`,color:"#fff",border:"none"},
    green:{background:`linear-gradient(135deg,${C.g6},${C.g9})`,color:"#fff",border:"none"},
    outline:{background:"transparent",color:C.p6,border:`2px solid ${C.p6}`},
    ghost:{background:C.p1,color:C.p6,border:"none"},
    danger:{background:C.r1,color:C.r5,border:"none"},
    muted:{background:C.bg,color:C.mu,border:`1.5px solid ${C.bd}`},
  };
  const b=h("button",{onClick,style:{...styles[v],padding:sm?"8px 14px":"12px 22px",
    borderRadius:"12px",fontWeight:"700",fontSize:sm?"13px":"15px",
    width:full?"100%":"auto",opacity:disabled?0.6:1,
    cursor:disabled?"not-allowed":"pointer",transition:"all .2s"}},label);
  if(disabled)b.disabled=true;
  return b;
}

function field(label,opts={}){
  const{type="text",value="",onChange,placeholder="",hint="",rows=0,options=null}=opts;
  const wrap=h("div",{style:{marginBottom:"15px"}});
  if(label)wrap.appendChild(h("label",{style:{display:"block",marginBottom:"5px",fontSize:"13px",fontWeight:"700",color:C.dk}},label));
  const s={width:"100%",padding:"11px 13px",borderRadius:"11px",border:`1.5px solid ${C.bd}`,fontSize:"15px",color:C.dk,background:C.bg,resize:"vertical"};
  let inp;
  if(options){
    inp=h("select",{style:s});
    options.forEach(([v2,l])=>inp.appendChild(h("option",{value:v2},l)));
    if(onChange)inp.addEventListener("change",e=>onChange(e.target.value));
  }else if(rows>0){inp=h("textarea",{style:s,placeholder,rows:""+rows},value||"");}
  else{inp=h("input",{type,style:s,placeholder,value:value||""});}
  if(onChange&&!options)inp.addEventListener("input",e=>onChange(e.target.value));
  inp.addEventListener("focus",()=>inp.style.border=`1.5px solid ${C.p6}`);
  inp.addEventListener("blur",()=>inp.style.border=`1.5px solid ${C.bd}`);
  wrap.appendChild(inp);
  if(hint)wrap.appendChild(h("p",{style:{fontSize:"12px",color:C.mu,marginTop:"3px"}},hint));
  return wrap;
}

async function saveReading(uid,data){
  try{
    await addDoc(collection(db,"users",uid,"readings"),{...data,createdAt:serverTimestamp()});
    return true;
  }catch(e){console.error(e);return false;}
}
async function saveVitals(uid,data){
  try{
    await addDoc(collection(db,"users",uid,"vitals"),{...data,createdAt:serverTimestamp()});
    return true;
  }catch(e){console.error(e);return false;}
}
async function loadReadings(uid){
  try{
    const q=query(collection(db,"users",uid,"readings"),orderBy("createdAt","desc"));
    const snap=await getDocs(q);
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){return[];}
}
async function loadVitals(uid){
  try{
    const q=query(collection(db,"users",uid,"vitals"),orderBy("createdAt","desc"));
    const snap=await getDocs(q);
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){return[];}
}
async function saveUserProfile(uid,data){
  try{
    await setDoc(doc(db,"users",uid),data,{merge:true});
    return true;
  }catch(e){return false;}
}
async function getUserProfile(uid){
  try{
    const snap=await getDoc(doc(db,"users",uid));
    return snap.exists()?snap.data():null;
  }catch(e){return null;}
}

        inner.appendChild(field("Phone Number",{type:"tel",placeholder:"e.g. 0911234567",onChange:v=>phone=v}));
        inner.appendChild(field("Sex",{type:"select",options:[["","-- Select --"],["male","Male"],["female","Female"]],onChange:v=>sex=v}));
        inner.appendChild(field("Age",{type:"number",placeholder:"e.g. 45",onChange:v=>age=v}));
        inner.appendChild(field("City",{placeholder:"e.g. Gondar",onChange:v=>city=v}));
        inner.appendChild(field("Diabetes Type",{type:"select",options:[["","-- Select --"],["type1","Type 1"],["type2","Type 2"],["gestational","Gestational"],["other","Other"]],onChange:v=>diabType=v}));
      }
    }
    inner.appendChild(field(t.email,{type:"email",placeholder:"email@example.com",onChange:v=>email=v}));
    if(mode!=="forgot")inner.appendChild(field(t.password,{type:"password",placeholder:"••••••••",onChange:v=>pass=v}));

    // Submit button
    const submitBtn=btn(mode==="login"?t.login:mode==="register"?t.register:"Send Reset",async()=>{
      if(!email.trim()){toast("Please enter your email","error");return;}
      submitBtn.textContent="Please wait...";submitBtn.disabled=true;
      try{
        if(mode==="forgot"){
          toast("Reset link sent to "+email);
          submitBtn.textContent="Send Reset";submitBtn.disabled=false;
          return;
        }
        if(!pass.trim()){toast("Please enter password","error");submitBtn.textContent=mode==="login"?t.login:t.register;submitBtn.disabled=false;return;}
        if(mode==="register"){
          const cred=await createUserWithEmailAndPassword(auth,email,pass);
          await saveUserProfile(cred.user.uid,{
            name:name||email.split("@")[0],email,role,
            phone:phone||"",sex:sex||"",age:Number(age)||0,
            city:city||"",diabType:diabType||"",
            status:role==="patient"?"pending":"active",
            createdAt:new Date().toISOString(),plan:"basic",planStatus:"unpaid",
            glucose:"",hba1c:"",sbp:"",dbp:"",bmi:"",weight:"",adherence:100
          });
          toast("Account created! "+(role==="patient"?"Awaiting doctor approval.":"Welcome!")+" 🎉");
        }else{
          await signInWithEmailAndPassword(auth,email,pass);
        }
      }catch(err){
        const msgs={"auth/user-not-found":"No account found. Please register first.",
          "auth/wrong-password":"Incorrect password. Try again.",
          "auth/email-already-in-use":"Email already registered. Please sign in.",
          "auth/invalid-email":"Invalid email address.",
          "auth/weak-password":"Password must be at least 6 characters.",
          "auth/invalid-credential":"Incorrect email or password."};
        toast(msgs[err.code]||"Error: "+err.message,"error");
        submitBtn.textContent=mode==="login"?t.login:t.register;
        submitBtn.disabled=false;
      }
    },{full:true});
    inner.appendChild(submitBtn);

    inner.appendChild(h("div",{style:{textAlign:"center",marginTop:"12px",fontSize:"13px",color:C.mu}},
      mode==="login"?h("span",{onClick:()=>{mode="register";const old=document.getElementById("authWrap");if(old)old.replaceWith(build());},
        style:{color:C.p6,fontWeight:"700",cursor:"pointer"}},t.register+" →")
      :h("span",{onClick:()=>{mode="login";const old=document.getElementById("authWrap");if(old)old.replaceWith(build());},
        style:{color:C.p6,fontWeight:"700",cursor:"pointer"}},"← "+t.login)
    ));
    right.appendChild(inner);
    wrap.appendChild(right);
    return wrap;
  }
  return build();
}

      content.appendChild(h("p",{style:{color:C.mu,fontSize:"12px",marginBottom:"13px"}},"Mizan Clinic · "+(STATE.online?"🟢 Online":"🔴 Offline")));
      const chatBox=h("div",{style:{background:C.wh,borderRadius:"16px",border:`1.5px solid ${C.bd}`,marginBottom:"13px",overflow:"hidden"}});
      const msgs=h("div",{style:{padding:"13px",maxHeight:"320px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"9px"}});

      function renderMsgs(msgList){
        msgs.innerHTML="";
        if(msgList.length===0){
          msgs.appendChild(h("p",{style:{textAlign:"center",color:C.mu,fontSize:"13px",padding:"20px 0"}},"No messages yet. Send a message to the clinic."));
        }
        msgList.forEach(m=>{
          const isMe=m.senderId===uid;
          msgs.appendChild(h("div",{style:{display:"flex",justifyContent:isMe?"flex-end":"flex-start"}},
            h("div",{style:{maxWidth:"78%",background:isMe?`linear-gradient(135deg,${C.p6},${C.p9})`:C.bg,
              borderRadius:isMe?"13px 13px 4px 13px":"4px 13px 13px 13px",padding:"9px 12px"}},
              h("p",{style:{margin:"0 0 2px",fontSize:"10px",fontWeight:"700",color:isMe?"rgba(255,255,255,.7)":C.mu}},isMe?"You":(m.senderName||"Clinic")),
              h("p",{style:{margin:"0",fontSize:"13px",color:isMe?"#fff":C.dk,lineHeight:"1.5"}},m.text),
              h("p",{style:{margin:"3px 0 0",fontSize:"9px",color:isMe?"rgba(255,255,255,.6)":C.mu,textAlign:"right"}},m.time||"")
            )
          ));
        });
        msgs.scrollTop=msgs.scrollHeight;
      }

      // Load messages and listen for new ones
      renderMsgs([]);
      getDocs(query(collection(db,"chats",uid,"messages"),orderBy("createdAt","asc"))).then(snap=>{
        renderMsgs(snap.docs.map(d=>({id:d.id,...d.data()})));
      }).catch(()=>{});

      chatBox.appendChild(msgs);
      const ir=h("div",{style:{borderTop:`1px solid ${C.bd}`,padding:"9px",display:"flex",gap:"7px",alignItems:"flex-end"}});
      const ta=h("textarea",{rows:"2",placeholder:t.typeMsg,
        style:{flex:"1",padding:"9px 12px",borderRadius:"9px",border:`1.5px solid ${C.bd}`,
          fontSize:"13px",resize:"none",fontFamily:"'Outfit',sans-serif",color:C.dk,background:C.bg}});
      let chatVal="";
      ta.addEventListener("input",e=>chatVal=e.target.value);

      async function sendMsg(){
        if(!chatVal.trim())return;
        const msg={text:chatVal,senderId:uid,senderName:uName,senderRole:"patient",
          time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
          createdAt:serverTimestamp()};
        ta.value="";chatVal="";
        await addDoc(collection(db,"chats",uid,"messages"),msg);
        await setDoc(doc(db,"chats",uid),{patientId:uid,patientName:uName,
          lastMsg:msg.text,lastTime:serverTimestamp(),unreadByDoctor:true},{merge:true});
        // Reload messages
        const snap=await getDocs(query(collection(db,"chats",uid,"messages"),orderBy("createdAt","asc")));
        renderMsgs(snap.docs.map(d=>({id:d.id,...d.data()})));
      }

      ta.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}});
      ir.appendChild(ta);
      ir.appendChild(btn(t.send,sendMsg,{sm:true}));
      chatBox.appendChild(ir);
      content.appendChild(chatBox);
    }

    else if(tb==="learn"){
      content.appendChild(h("h2",{className:"fu",style:{fontSize:"21px",fontWeight:"900",color:C.dk,marginBottom:"13px"}},"📚 "+t.learn));
      const grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"11px"}});
      [{icon:"💉",cat:"Basics",title:"Understanding Blood Sugar",time:"5 min",c:C.p6},
       {icon:"🦶",cat:"Prevention",title:"Daily Foot Care",time:"4 min",c:C.g7},
       {icon:"🥗",cat:"Nutrition",title:"Eating Well in Ethiopia",time:"7 min",c:C.o5},
       {icon:"🚶",cat:"Lifestyle",title:"Exercise & Glucose",time:"6 min",c:C.p6},
       {icon:"💊",cat:"Medication",title:"Why Adherence Matters",time:"3 min",c:C.g7},
       {icon:"🧠",cat:"Mental Health",title:"Stress & Blood Sugar",time:"5 min",c:C.r5}
      ].forEach(e=>{
        grid.appendChild(h("div",{onClick:()=>toast("Opening: "+e.title),
          style:{background:C.wh,borderRadius:"14px",padding:"13px",border:`1.5px solid ${C.bd}`,cursor:"pointer"}},
          h("div",{style:{width:"38px",height:"38px",borderRadius:"9px",background:e.c+"20",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:"19px",marginBottom:"7px"}},e.icon),
          pill(e.cat,e.c,e.c+"20"),
          h("h4",{style:{margin:"6px 0 4px",fontSize:"12px",fontWeight:"700",color:C.dk,lineHeight:"1.4"}},e.title),
          h("p",{style:{margin:"0",fontSize:"11px",color:e.c,fontWeight:"600"}},"▶ "+e.time)
        ));
      });
      content.appendChild(grid);
    }

    else if(tb==="plans"){
      const uid=STATE.user?.uid;
      content.appendChild(h("h2",{className:"fu",style:{fontSize:"21px",fontWeight:"900",color:C.dk,marginBottom:"4px"}},"⭐ "+t.plans_title));
      content.appendChild(h("p",{style:{color:C.mu,fontSize:"12px",marginBottom:"14px"}},"Pay via Telebirr · Verified by clinic within 24 hours"));

      const currentPlan=STATE.userDoc?.plan||"basic";
      const planStatus=STATE.userDoc?.planStatus||"unpaid";

      // Show current plan status banner
      if(planStatus==="pending_verification"){
        content.appendChild(h("div",{style:{background:C.o1,border:`1.5px solid ${C.o5}`,borderRadius:"14px",padding:"14px",marginBottom:"14px",display:"flex",gap:"10px",alignItems:"center"}},
          h("span",{style:{fontSize:"24px"}},"⏳"),
          h("div",{},
            h("p",{style:{margin:"0",fontSize:"14px",fontWeight:"800",color:C.o5}},"Payment Pending Verification"),
            h("p",{style:{margin:"3px 0 0",fontSize:"12px",color:C.md}},"Your "+currentPlan+" plan payment is being reviewed by the clinic. You will be notified once verified.")
          )
        ));
      }else if(planStatus==="active"){
        content.appendChild(h("div",{style:{background:C.g1,border:`1.5px solid ${C.g2}`,borderRadius:"14px",padding:"14px",marginBottom:"14px",display:"flex",gap:"10px",alignItems:"center"}},
          h("span",{style:{fontSize:"24px"}},"✅"),
          h("div",{},
            h("p",{style:{margin:"0",fontSize:"14px",fontWeight:"800",color:C.g7}},"Active Plan: "+currentPlan.charAt(0).toUpperCase()+currentPlan.slice(1)),
            h("p",{style:{margin:"3px 0 0",fontSize:"12px",color:C.g7}},"Your subscription is active. Enjoy all your plan benefits!")
          )
        ));
      }

      [{name:"basic",price:3,c:C.md,
        inc:["Glucose logging","Medication reminders","Basic education","Monthly check-in"],
        exc:["In-app chat","Complication screening","Product delivery","Home visit"]},
       {name:"standard",price:7,c:C.p6,popular:true,
        inc:["Everything in Basic","In-app chat with clinic","Complication screening","Dietitian access"],
        exc:["Product delivery","Home visit"]},
       {name:"premium",price:12,c:C.g7,
        inc:["Everything in Standard","Product delivery to home","Home nursing visit ×1/month","Priority support 24/7"],
        exc:[]}
      ].forEach(p=>{
        const isCurrent=currentPlan===p.name;
        const isActive=isCurrent&&planStatus==="active";
        const isPending=isCurrent&&planStatus==="pending_verification";

        const pc=h("div",{style:{background:C.wh,borderRadius:"16px",padding:"18px",marginBottom:"12px",
          border:`${isCurrent?2:1.5}px solid ${isCurrent?p.c:C.bd}`,position:"relative",
          boxShadow:isCurrent?`0 4px 20px ${p.c}20`:"none"}});

        if(p.popular&&!isCurrent)pc.appendChild(h("div",{style:{position:"absolute",top:"-9px",right:"14px",
          background:`linear-gradient(135deg,${C.p6},${C.p9})`,color:"#fff",
          fontSize:"10px",fontWeight:"700",padding:"2px 10px",borderRadius:"20px"}},"MOST POPULAR"));
        if(isActive)pc.appendChild(h("div",{style:{position:"absolute",top:"-9px",left:"14px",
          background:`linear-gradient(135deg,${C.g6},${C.g9})`,color:"#fff",
          fontSize:"10px",fontWeight:"700",padding:"2px 10px",borderRadius:"20px"}},"✓ ACTIVE"));
        if(isPending)pc.appendChild(h("div",{style:{position:"absolute",top:"-9px",left:"14px",
          background:`linear-gradient(135deg,${C.o5},#c4640e)`,color:"#fff",
          fontSize:"10px",fontWeight:"700",padding:"2px 10px",borderRadius:"20px"}},"⏳ PENDING"));

        pc.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"11px"}},
          h("h3",{style:{fontSize:"18px",fontWeight:"900",color:p.c}},t[p.name]||p.name),
          h("div",{},h("span",{style:{fontSize:"26px",fontWeight:"900",color:p.c}},"$"+p.price),
            h("span",{style:{fontSize:"11px",color:C.mu}},"/mo ≈ "+Math.round(p.price*57)+" ETB"))
        ));
        p.inc.forEach(f=>pc.appendChild(h("div",{style:{display:"flex",gap:"7px",alignItems:"center",marginBottom:"4px",fontSize:"12px",color:C.dk}},
          h("span",{style:{color:p.c,fontWeight:"700"}},"✓")," ",f)));
        p.exc.forEach(f=>pc.appendChild(h("div",{style:{display:"flex",gap:"7px",alignItems:"center",marginBottom:"4px",fontSize:"12px",color:C.mu}},"✗ ",f)));

        if(isActive){
          pc.appendChild(h("div",{style:{marginTop:"10px",background:C.g1,borderRadius:"9px",padding:"9px 12px",
            fontSize:"12px",color:C.g7,fontWeight:"700",textAlign:"center"}},"✓ Your current active plan"));
        }else if(isPending){
          pc.appendChild(h("div",{style:{marginTop:"10px",background:C.o1,borderRadius:"9px",padding:"9px 12px",
            fontSize:"12px",color:C.o5,fontWeight:"700",textAlign:"center"}},"⏳ Payment sent — awaiting clinic verification"));
        }else{
          // Show Telebirr payment instructions
          pc.appendChild(h("div",{style:{marginTop:"13px",background:`${p.c}10`,borderRadius:"10px",padding:"13px"}},
            h("p",{style:{fontSize:"12px",fontWeight:"800",color:p.c,marginBottom:"8px"}},"📱 Pay via Telebirr"),
            h("div",{style:{background:C.wh,borderRadius:"8px",padding:"10px",marginBottom:"8px"}},
              h("p",{style:{fontSize:"12px",color:C.mu,marginBottom:"3px"}},"Send to:"),
              h("p",{style:{fontSize:"16px",fontWeight:"900",color:C.dk,letterSpacing:"1px"}},"0930563960"),
              h("p",{style:{fontSize:"12px",color:C.mu,marginTop:"3px"}},"Recipient: ",h("strong",{},"Ayenachew Nigus")),
              h("p",{style:{fontSize:"13px",fontWeight:"800",color:p.c,marginTop:"6px"}},"Amount: $"+p.price+" ≈ "+Math.round(p.price*57)+" ETB")
            ),
            h("p",{style:{fontSize:"11px",color:C.mu,marginBottom:"10px"}},"After sending, tap the button below. The clinic will verify within 24 hours."),
            h("button",{onClick:async()=>{
              await saveUserProfile(uid,{plan:p.name,planStatus:"pending_verification",planRequestedAt:new Date().toISOString()});
              // Notify clinic via chat
              await addDoc(collection(db,"chats",uid,"messages"),{
                text:"💳 Payment notification: I have paid "+Math.round(p.price*57)+" ETB for the "+p.name+" plan ($"+p.price+"/mo) via Telebirr to 0930563960. Please verify.",
                senderId:uid,senderName:STATE.userDoc?.name||"Patient",senderRole:"patient",
                time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
                createdAt:serverTimestamp()
              });
              await setDoc(doc(db,"chats",uid),{
                patientId:uid,patientName:STATE.userDoc?.name,
                lastMsg:"Payment notification sent",lastTime:serverTimestamp(),unreadByDoctor:true
              },{merge:true});
              STATE.userDoc={...STATE.userDoc,plan:p.name,planStatus:"pending_verification"};
              toast("Payment notification sent! Clinic will verify within 24 hours.");
              renderContent();
            },style:{width:"100%",padding:"11px",background:`linear-gradient(135deg,${p.c},${C.p9})`,
              border:"none",color:"#fff",borderRadius:"9px",fontWeight:"700",fontSize:"13px",cursor:"pointer"}},
            "✓ I Have Paid — Notify Clinic")
          ));
        }
        content.appendChild(pc);
      });
    }

    // Scroll chat to bottom
    const chatMsgs=content.querySelector("#chatMsgs");
    if(chatMsgs)chatMsgs.scrollTop=chatMsgs.scrollHeight;
  }

  renderContent();
  return wrap;
}

function renderClinic(){
  const t=T[STATE.lang];
  // Real patients loaded from Firebase
  let REAL_PTS=[];

  const sidebar=h("div",{style:{width:"190px",background:`linear-gradient(180deg,${C.p9} 0%,#071a2e 100%)`,

   {id:"analytics",icon:"📈",label:t.analytics},{id:"followup",icon:"🔔",label:t.followup}
  ].forEach(n=>{
    const active=STATE.clinicView===n.id&&!STATE.selectedPt;
    nav.appendChild(h("button",{onClick:()=>{STATE.clinicView=n.id;STATE.selectedPt=null;renderMain();},
      style:{width:"100%",display:"flex",alignItems:"center",gap:"7px",padding:"8px 9px",
        borderRadius:"9px",border:"none",marginBottom:"2px",textAlign:"left",
        background:active?"rgba(255,255,255,.13)":"transparent",
        color:active?"#fff":"rgba(255,255,255,.5)",fontWeight:active?"700":"500",fontSize:"12px",
        borderLeft:active?`3px solid ${C.g6}`:"3px solid transparent"}},
      h("span",{style:{fontSize:"14px"}},n.icon),n.label));
  });
  sidebar.appendChild(nav);

  const sdoc=h("div",{style:{padding:"0 7px 14px"}});
  sdoc.appendChild(h("div",{style:{background:"rgba(255,255,255,.07)",borderRadius:"9px",padding:"9px 11px",marginBottom:"7px"}},
    h("div",{style:{fontSize:"16px",marginBottom:"3px"}},"👨‍⚕️"),
    h("p",{style:{color:"#fff",margin:"0",fontSize:"11px",fontWeight:"700"}},"Dr. Ayenachew"),
    h("p",{style:{color:"rgba(255,255,255,.4)",margin:"2px 0 0",fontSize:"9px"}},"CEO & Founder")
  ));
  sdoc.appendChild(h("button",{onClick:async()=>{await signOut(auth);},
    style:{width:"100%",padding:"7px",borderRadius:"8px",border:"1px solid rgba(255,255,255,.12)",
      background:"transparent",color:"rgba(255,255,255,.55)",fontSize:"11px",fontWeight:"600"}},"← Sign Out"));
  sidebar.appendChild(sdoc);
  wrap.appendChild(sidebar);

  const main=h("div",{id:"clinicMain",style:{flex:"1",padding:"22px",overflowY:"auto",maxHeight:"100vh"}});
  wrap.appendChild(main);

  // Open chat for a specific patient from anywhere in the clinic dashboard
  function openPatientChat(p){
    STATE.clinicView="chat";
    STATE.chatOpenPatient=p;
    renderMain();
  }

  function renderMain(){
    main.innerHTML="";
    if(STATE.selectedPt){renderPtDetail();return;}

    if(STATE.clinicView==="overview"){
      main.appendChild(h("div",{className:"fu",style:{marginBottom:"20px"}},

        h("p",{style:{color:C.mu,fontSize:"13px",margin:"3px 0 0"}},new Date().toDateString()+" · "+REAL_PTS.length+" patients")
      ));
      const high=REAL_PTS.filter(p=>p.level==="high").length;
      const totalRev=REAL_PTS.reduce((s,p)=>s+(p.sub==="premium"?12:p.sub==="standard"?7:3),0);
      const grid=h("div",{className:"fu1",style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"11px",marginBottom:"18px"}});
      [{l:"Total Patients",v:REAL_PTS.length,i:"👥",c:C.p6,bg:C.p1},
       {l:"Subscriptions",v:REAL_PTS.length,i:"⭐",c:C.g7,bg:C.g1},
       {l:"High Risk",v:high,i:"🚨",c:C.r5,bg:C.r1},
       {l:"Monthly Rev",v:"$"+totalRev,i:"💰",c:C.o5,bg:C.o1}
      ].forEach(k=>{
        grid.appendChild(h("div",{style:{background:C.wh,borderRadius:"14px",padding:"15px",border:`1.5px solid ${C.bd}`}},
          h("div",{style:{width:"36px",height:"36px",borderRadius:"9px",background:k.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px",marginBottom:"9px"}},k.i),
          h("div",{style:{fontSize:"26px",fontWeight:"900",color:k.c,letterSpacing:"-1px",lineHeight:"1"}},k.v),
          h("div",{style:{fontSize:"11px",fontWeight:"700",color:C.dk,margin:"4px 0 0"}},k.l)
        ));
      });
      main.appendChild(grid);
      // Firebase status card
      main.appendChild(h("div",{className:"fu2",style:{background:`linear-gradient(135deg,${C.p9},${C.g9})`,
        borderRadius:"16px",padding:"18px",color:"#fff",marginBottom:"16px"}},
        h("p",{style:{fontSize:"11px",opacity:".6",letterSpacing:"1.5px",marginBottom:"7px"}},"☁️ FIREBASE STATUS"),
        h("h3",{style:{fontSize:"16px",fontWeight:"800",marginBottom:"10px"}},"Backend Connected · Real-time sync active"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"9px"}},
          [{icon:"🔐",l:"Auth",s:"Active"},{icon:"📊",l:"Firestore",s:"Connected"},{icon:"🔄",l:"Sync",s:"Live"}].map(a=>
            h("div",{style:{background:"rgba(255,255,255,.1)",borderRadius:"9px",padding:"10px",textAlign:"center"}},

              h("p",{style:{margin:"2px 0 0",fontSize:"10px",opacity:".7"}},a.s)

          style:{padding:"10px 0",borderBottom:i<arr.length-1?`1px solid ${C.bd}`:"none",cursor:"pointer"}},

            h("span",{style:{fontSize:"13px",fontWeight:"700",color:C.dk}},p.name),
            pill("Score: "+p.score,C.r5,C.r1)
          ),
          h("p",{style:{margin:"0",fontSize:"11px",color:C.mu}},"Glucose: "+p.glucose+" · HbA1c: "+p.hba1c+"% · Adh: "+p.adherence+"%")
        ));
      });
      main.appendChild(hrCard);
    }

    else if(STATE.clinicView==="patients"){
      main.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}},
        h("h1",{style:{fontSize:"22px",fontWeight:"900",color:C.dk,margin:"0"}},"Patient Registry"),
        btn(t.enrollPt||"+ Enroll",()=>toast("Opening enrollment form..."),{sm:true})
      ));

      const filtered=STATE.clinicFilter==="all"?REAL_PTS:REAL_PTS.filter(p=>p.level===STATE.clinicFilter);

            padding:"11px 14px",gap:"10px",borderTop:`1px solid ${C.bd}`,cursor:"pointer",alignItems:"center"}});

        row.addEventListener("mouseout",()=>row.style.background="");

        h("h2",{style:{fontSize:"17px",fontWeight:"800",margin:"0"}},p.name),
        h("p",{style:{margin:"3px 0 0",fontSize:"11px",opacity:".7"}},p.type+" · Age "+p.age+" · "+p.city),
        h("div",{style:{marginTop:"5px",display:"flex",gap:"5px"}},
          pill(level.toUpperCase()+" RISK",rC(level),"rgba(255,255,255,.2)"),
          pill("Score: "+score,"#fff","rgba(255,255,255,.15)")
        )
      )
    ));
    ph.appendChild(h("div",{style:{display:"flex",gap:"6px"}},
      h("button",{onClick:()=>{openPatientChat(p);},style:{padding:"7px 12px",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",borderRadius:"9px",fontWeight:"700",fontSize:"11px"}},"💬 Chat"),
      h("button",{onClick:()=>toast("Appointment booked!"),style:{padding:"7px 12px",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",borderRadius:"9px",fontWeight:"700",fontSize:"11px"}},"📅 Book")
    ));
    main.appendChild(ph);

    // Tabs
    const ptTabs=h("div",{style:{display:"flex",gap:"5px",marginBottom:"14px",overflowX:"auto",paddingBottom:"3px"}});
    [["overview","📊 Overview"],["history","📋 History"],["investigations","🔬 Labs"],
     ["imaging","🖼️ Imaging"],["meds","💊 Meds"],["actions","⚡ Actions"]].forEach(([id,label])=>{
      const active=STATE.ptDetailTab===id;
      ptTabs.appendChild(h("button",{onClick:()=>{STATE.ptDetailTab=id;renderMain();},
        style:{padding:"6px 13px",borderRadius:"9px",border:active?"none":`1.5px solid ${C.bd}`,
          background:active?`linear-gradient(135deg,${C.p6},${C.p9})`:C.wh,
          color:active?"#fff":C.md,fontWeight:"700",fontSize:"12px",whiteSpace:"nowrap"}},label));
    });
    main.appendChild(ptTabs);

    if(STATE.ptDetailTab==="overview"){
      const vs=h("div",{style:{background:C.wh,borderRadius:"14px",padding:"16px",marginBottom:"12px",border:`1.5px solid ${C.bd}`}});
      vs.appendChild(h("h4",{style:{fontSize:"12px",fontWeight:"800",color:C.dk,margin:"0 0 11px",letterSpacing:".5px"}},"VITALS"));
      [{l:"Glucose",v:p.glucose+" mg/dL",c:gSt(p.glucose).c},{l:"HbA1c",v:p.hba1c+"%",c:p.hba1c>8?C.r5:p.hba1c>7?C.o5:C.g7},
       {l:"Blood Pressure",v:p.sbp+"/"+p.dbp,c:p.sbp>140?C.r5:C.g7},{l:"BMI",v:p.bmi,c:C.p6},{l:"Adherence",v:p.adherence+"%",c:p.adherence>70?C.g6:C.r5}
      ].forEach((s,i)=>{
        vs.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.bd}`}},
          h("span",{style:{fontSize:"12px",color:C.mu,fontWeight:"600"}},s.l),
          h("span",{style:{fontSize:"12px",fontWeight:"800",color:s.c}},s.v)
        ));
      });
      main.appendChild(vs);
      // AI recommendation
      main.appendChild(h("div",{style:{background:level==="high"?C.r1:level==="medium"?C.o1:C.g1,
        borderRadius:"14px",padding:"14px",border:`1px solid ${rC(level)}30`}},
        h("p",{style:{fontSize:"11px",fontWeight:"700",color:C.mu,marginBottom:"6px"}},"🤖 AI RECOMMENDATION"),
        h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
          h("div",{style:{width:"48px",height:"48px",borderRadius:"50%",background:rBg(level),
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            border:`2px solid ${rC(level)}`,flexShrink:"0"}},
            h("span",{style:{fontSize:"14px",fontWeight:"900",color:rC(level)}},score),
            h("span",{style:{fontSize:"8px",color:rC(level),fontWeight:"700"}},"/100")
          ),
          h("p",{style:{margin:"0",fontSize:"13px",color:C.dk,fontWeight:"600",lineHeight:"1.5"}},
            level==="high"?"Urgent consultation needed. Consider insulin initiation or emergency referral.":
            p.adherence<50?"Poor adherence detected. Schedule counseling session urgently.":
            "Patient on track. Continue current care plan.")
        )
      ));
    }

    else if(STATE.ptDetailTab==="history"){
      const notesDiv=h("div");main.appendChild(notesDiv);
      async function loadNotes(){
        notesDiv.innerHTML="";
        const snap=await getDocs(query(collection(db,"users",p.id,"notes"),orderBy("createdAt","desc")));
        const notes=snap.docs.map(d=>({id:d.id,...d.data()}));
        const nc=h("div",{style:{background:C.wh,borderRadius:"14px",padding:"16px",marginBottom:"12px",border:`1.5px solid ${C.bd}`}});
        nc.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"800",color:C.dk,marginBottom:"12px"}},"📋 Clinical History"));
        if(notes.length===0)nc.appendChild(h("p",{style:{color:C.mu,fontSize:"13px",textAlign:"center",padding:"14px 0"}},"No clinical notes yet."));
        notes.forEach((n,i,arr)=>{
          nc.appendChild(h("div",{style:{padding:"11px 0",borderBottom:i<arr.length-1?`1px solid ${C.bd}`:"none"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},
              h("span",{style:{fontSize:"12px",fontWeight:"800",color:C.p6}},n.date||""),
              h("span",{style:{fontSize:"11px",color:C.mu}},"👨‍⚕️ "+(n.doctor||"Doctor"))
            ),
            h("p",{style:{margin:"0",fontSize:"13px",color:C.dk,lineHeight:"1.6"}},n.text||"")
          ));
        });
        notesDiv.appendChild(nc);
        let noteText="";
        const af=h("div",{style:{background:C.wh,borderRadius:"14px",padding:"16px",border:`1.5px solid ${C.bd}`}});
        af.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"800",color:C.dk,marginBottom:"11px"}},"➕ Add Clinical Note"));
        af.appendChild(field("Clinical Note",{rows:4,placeholder:"Enter clinical observations, plan...",onChange:v=>noteText=v}));
        af.appendChild(btn("Save Note",async()=>{
          if(!noteText.trim()){toast("Enter a note","error");return;}
          await addDoc(collection(db,"users",p.id,"notes"),{text:noteText,date:new Date().toLocaleDateString(),doctor:STATE.userDoc?.name||"Doctor",createdAt:serverTimestamp()});
          toast("Note saved! ☁️");loadNotes();
        },{full:true}));
        notesDiv.appendChild(af);
      }
      loadNotes();
    }

    else if(STATE.ptDetailTab==="investigations"){
      const invDiv=h("div");main.appendChild(invDiv);
      async function loadInv(){
        invDiv.innerHTML="";
        const snap=await getDocs(query(collection(db,"users",p.id,"investigations"),orderBy("createdAt","desc")));
        const invs=snap.docs.map(d=>({id:d.id,...d.data()}));
        const ic=h("div",{style:{background:C.wh,borderRadius:"14px",padding:"16px",marginBottom:"12px",border:`1.5px solid ${C.bd}`,overflowX:"auto"}});
        ic.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"800",color:C.dk,marginBottom:"12px"}},"🔬 Investigation Results"));
        if(invs.length===0)ic.appendChild(h("p",{style:{color:C.mu,fontSize:"13px",textAlign:"center",padding:"14px 0"}},"No investigations yet."));
        invs.forEach(inv=>{
          const sc=inv.status==="high"?C.r5:inv.status==="elevated"?C.o5:C.g6;
          const sbg=inv.status==="high"?C.r1:inv.status==="elevated"?C.o1:C.g1;
          ic.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.bd}`}},
            h("div",{},
              h("p",{style:{margin:"0 0 2px",fontSize:"13px",fontWeight:"700",color:C.dk}},inv.test||""),
              h("p",{style:{margin:"0",fontSize:"11px",color:C.mu}},inv.date+" · Ref: "+(inv.ref||""))
            ),
            h("div",{style:{textAlign:"right"}},
              h("p",{style:{margin:"0 0 2px",fontSize:"14px",fontWeight:"800",color:sc}},inv.result||""),
              pill((inv.status||"normal").toUpperCase(),sc,sbg)
            )
          ));
        });
        invDiv.appendChild(ic);
        let iv={test:"",result:"",ref:"",status:"normal"};
        const af=h("div",{style:{background:C.wh,borderRadius:"14px",padding:"16px",border:`1.5px solid ${C.bd}`}});
        af.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"800",color:C.dk,marginBottom:"11px"}},"➕ Add Investigation Result"));
        af.appendChild(field("Test Name",{placeholder:"e.g. HbA1c, Fasting Glucose, Creatinine",onChange:v=>iv.test=v}));
        af.appendChild(field("Result",{placeholder:"e.g. 8.5%",onChange:v=>iv.result=v}));
        af.appendChild(field("Reference Range",{placeholder:"e.g. <7%",onChange:v=>iv.ref=v}));
        af.appendChild(field("Status",{type:"select",options:[["normal","Normal"],["elevated","Elevated"],["high","High / Abnormal"]],onChange:v=>iv.status=v}));
        af.appendChild(btn("Save Result",async()=>{
          if(!iv.test||!iv.result){toast("Enter test and result","error");return;}
          await addDoc(collection(db,"users",p.id,"investigations"),{...iv,date:new Date().toLocaleDateString(),addedBy:STATE.userDoc?.name||"Doctor",createdAt:serverTimestamp()});
          toast("Investigation saved! ☁️");loadInv();
        },{full:true}));
        invDiv.appendChild(af);
      }
      loadInv();
    }

    else if(STATE.ptDetailTab==="imaging"){
      const imgDiv=h("div");main.appendChild(imgDiv);
      async function loadImaging(){
        imgDiv.innerHTML="";
        const snap=await getDocs(query(collection(db,"users",p.id,"imaging"),orderBy("createdAt","desc")));
        const imgs=snap.docs.map(d=>({id:d.id,...d.data()}));
        const ic=h("div",{style:{background:C.wh,borderRadius:"14px",padding:"16px",marginBottom:"12px",border:`1.5px solid ${C.bd}`}});
        ic.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"800",color:C.dk,marginBottom:"12px"}},"🖼️ Imaging Reports"));
        if(imgs.length===0)ic.appendChild(h("p",{style:{color:C.mu,fontSize:"13px",textAlign:"center",padding:"14px 0"}},"No imaging reports yet."));
        imgs.forEach(img=>{
          ic.appendChild(h("div",{style:{background:C.bg,borderRadius:"10px",padding:"12px",marginBottom:"8px",border:`1px solid ${C.bd}`}},
            h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"5px"}},
              h("span",{style:{fontSize:"13px",fontWeight:"800",color:C.dk}},"🖼️ "+(img.type||"")),
              h("span",{style:{fontSize:"11px",color:C.mu}},img.date||"")
            ),
            h("p",{style:{margin:"0 0 3px",fontSize:"12px",color:C.dk,lineHeight:"1.6"}},img.finding||""),
            h("p",{style:{margin:"0",fontSize:"10px",color:C.mu}},"Reported by: "+(img.rep||"Doctor"))
          ));
        });
        imgDiv.appendChild(ic);
        let imgv={type:"",finding:""};
        const af=h("div",{style:{background:C.wh,borderRadius:"14px",padding:"16px",border:`1.5px solid ${C.bd}`}});
        af.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"800",color:C.dk,marginBottom:"11px"}},"➕ Add Imaging Report"));
        af.appendChild(field("Imaging Type",{placeholder:"e.g. Chest X-Ray, Fundoscopy, Renal Ultrasound",onChange:v=>imgv.type=v}));
        af.appendChild(field("Finding",{rows:3,placeholder:"Enter radiologist report finding...",onChange:v=>imgv.finding=v}));
        af.appendChild(btn("Save Report",async()=>{
          if(!imgv.type||!imgv.finding){toast("Enter type and finding","error");return;}
          await addDoc(collection(db,"users",p.id,"imaging"),{...imgv,date:new Date().toLocaleDateString(),rep:STATE.userDoc?.name||"Doctor",createdAt:serverTimestamp()});
          toast("Imaging report saved! ☁️");loadImaging();
        },{full:true}));
        imgDiv.appendChild(af);
      }
      loadImaging();
    }

    else if(STATE.ptDetailTab==="meds"){
      const medsDiv=h("div");main.appendChild(medsDiv);
      async function loadMeds(){
        medsDiv.innerHTML="";
        const snap=await getDocs(collection(db,"users",p.id,"medications"));
        const meds=snap.docs.map(d=>({id:d.id,...d.data()}));
        const mc=h("div",{style:{background:C.wh,borderRadius:"14px",padding:"16px",marginBottom:"12px",border:`1.5px solid ${C.bd}`}});
        mc.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"800",color:C.dk,marginBottom:"12px"}},"💊 Current Medications"));
        if(meds.length===0){mc.appendChild(h("p",{style:{color:C.mu,fontSize:"13px",textAlign:"center",padding:"14px 0"}},"No medications added yet."));}
        meds.forEach(m=>{
          mc.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.bd}`}},
            h("div",{},
              h("p",{style:{margin:"0 0 2px",fontSize:"13px",fontWeight:"700",color:C.dk}},m.name),
              h("p",{style:{margin:"0",fontSize:"11px",color:C.mu}},m.dose+" · "+m.frequency)
            ),
            h("div",{style:{display:"flex",gap:"5px",alignItems:"center"}},
              pill(m.active!==false?"Active":"Paused",m.active!==false?C.g7:C.mu,m.active!==false?C.g1:C.bg),
              h("button",{onClick:async()=>{
                if(confirm("Remove "+m.name+"?")){
                  await deleteDoc(doc(db,"users",p.id,"medications",m.id));
                  toast(m.name+" removed.");loadMeds();
                }
              },style:{background:C.r1,border:"none",color:C.r5,borderRadius:"7px",padding:"4px 8px",fontSize:"11px",fontWeight:"700",cursor:"pointer"}},"✕")
            )
          ));
        });
        medsDiv.appendChild(mc);
        // Add medication form
        let mv={name:"",dose:"",frequency:"",instructions:""};
        const af=h("div",{style:{background:C.wh,borderRadius:"14px",padding:"16px",border:`1.5px solid ${C.bd}`}});
        af.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"800",color:C.dk,marginBottom:"12px"}},"➕ Add Medication"));
        af.appendChild(field("Medication Name",{placeholder:"e.g. Metformin",required:true,onChange:v=>mv.name=v}));
        af.appendChild(field("Dose",{placeholder:"e.g. 500mg",required:true,onChange:v=>mv.dose=v}));
        af.appendChild(field("Frequency",{placeholder:"e.g. Twice daily with meals",required:true,onChange:v=>mv.frequency=v}));
        af.appendChild(field("Instructions (optional)",{placeholder:"e.g. Take with food",onChange:v=>mv.instructions=v}));
        af.appendChild(btn("Add Medication",async()=>{
          if(!mv.name||!mv.dose||!mv.frequency){toast("Fill all required fields","error");return;}
          await addDoc(collection(db,"users",p.id,"medications"),{...mv,active:true,addedBy:STATE.userDoc?.name||"Doctor",addedAt:new Date().toLocaleDateString(),createdAt:serverTimestamp()});
          // Notify patient via chat
          await addDoc(collection(db,"chats",p.id,"messages"),{
            text:"💊 New medication prescribed: "+mv.name+" "+mv.dose+", "+mv.frequency+(mv.instructions?". "+mv.instructions:""),
            senderId:STATE.user.uid,senderName:STATE.userDoc?.name||"Doctor",senderRole:"doctor",
            time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),createdAt:serverTimestamp()
          });
          await setDoc(doc(db,"chats",p.id),{lastMsg:"New medication: "+mv.name,lastTime:serverTimestamp(),unreadByDoctor:false},{merge:true});
          toast("Medication added & patient notified! ☁️");
          loadMeds();
        },{full:true,v:"green"}));
        medsDiv.appendChild(af);
      }
      loadMeds();
    }

    else if(STATE.ptDetailTab==="actions"){
      const ag=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}});
      [{l:"💬 Send Message",fn:()=>openPatientChat(p)},
       {l:"📅 Book Appointment",fn:async()=>{
         await addDoc(collection(db,"users",p.id,"appointments"),{reason:"Follow-up",date:"TBD",status:"confirmed",doctor:STATE.userDoc?.name||"Doctor",createdAt:serverTimestamp()});
         await addDoc(collection(db,"chats",p.id,"messages"),{text:"📅 A follow-up appointment has been scheduled for you. We will confirm the date shortly.",senderId:STATE.user.uid,senderName:STATE.userDoc?.name||"Doctor",senderRole:"doctor",time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),createdAt:serverTimestamp()});
         await setDoc(doc(db,"chats",p.id),{lastMsg:"Appointment scheduled",lastTime:serverTimestamp(),unreadByDoctor:false},{merge:true});
         toast("Appointment booked & patient notified!");
       }},
       {l:"✅ Verify Payment",fn:async()=>{
         await setDoc(doc(db,"users",p.id),{planStatus:"active",planActivatedBy:STATE.userDoc?.name||"Doctor",planActivatedAt:new Date().toISOString()},{merge:true});
         await addDoc(collection(db,"chats",p.id,"messages"),{text:"✅ Your "+(p.plan||"basic")+" plan is now ACTIVE! Welcome to Mizan.",senderId:STATE.user.uid,senderName:STATE.userDoc?.name||"Doctor",senderRole:"doctor",time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),createdAt:serverTimestamp()});
         await setDoc(doc(db,"chats",p.id),{lastMsg:"Plan activated!",lastTime:serverTimestamp(),unreadByDoctor:false},{merge:true});
         toast("Plan activated & patient notified!");
       }},
       {l:"📊 Request Lab Work",fn:async()=>{
         await addDoc(collection(db,"chats",p.id,"messages"),{text:"🔬 Please come to the clinic for lab work: HbA1c, Fasting Glucose, Creatinine, Lipid Profile.",senderId:STATE.user.uid,senderName:STATE.userDoc?.name||"Doctor",senderRole:"doctor",time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),createdAt:serverTimestamp()});
         await setDoc(doc(db,"chats",p.id),{lastMsg:"Lab work requested",lastTime:serverTimestamp(),unreadByDoctor:false},{merge:true});
         toast("Lab request sent via chat!");
       }},
       {l:"🖼️ Request Imaging",fn:async()=>{
         await addDoc(collection(db,"chats",p.id,"messages"),{text:"📷 Please come in for imaging. The doctor will discuss the specifics at your visit.",senderId:STATE.user.uid,senderName:STATE.userDoc?.name||"Doctor",senderRole:"doctor",time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),createdAt:serverTimestamp()});
         await setDoc(doc(db,"chats",p.id),{lastMsg:"Imaging requested",lastTime:serverTimestamp(),unreadByDoctor:false},{merge:true});
         toast("Imaging request sent via chat!");
       }},
       {l:"📤 Refer to Specialist",fn:async()=>{
         await addDoc(collection(db,"users",p.id,"notes"),{text:"Referral to specialist initiated.",date:new Date().toLocaleDateString(),doctor:STATE.userDoc?.name||"Doctor",createdAt:serverTimestamp()});
         toast("Referral noted in patient history!");
       }},
       {l:"🚨 Flag Emergency",fn:async()=>{
         await setDoc(doc(db,"users",p.id),{emergency:true},{merge:true});
         await addDoc(collection(db,"chats",p.id,"messages"),{text:"🚨 URGENT: Please come to Mizan Clinic immediately or call emergency services.",senderId:STATE.user.uid,senderName:STATE.userDoc?.name||"Doctor",senderRole:"doctor",time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),createdAt:serverTimestamp()});
         await setDoc(doc(db,"chats",p.id),{lastMsg:"URGENT: Come to clinic immediately",lastTime:serverTimestamp(),unreadByDoctor:false},{merge:true});
         toast(p.name+" flagged as emergency & notified!","warn");
       },danger:true},
       {l:"🗑️ Delete Patient",fn:()=>{
         if(confirm("Delete "+p.name+"? All data will be permanently removed.")){
           deleteDoc(doc(db,"users",p.id)).then(()=>{toast(p.name+" deleted.","warn");STATE.selectedPt=null;loadPatientsAndRender();}).catch(()=>toast("Delete failed","error"));
         }
       },danger:true}
      ].forEach(a=>{
        ag.appendChild(h("button",{onClick:a.fn,
          style:{padding:"13px",background:a.danger?C.r1:C.wh,border:`1.5px solid ${a.danger?C.r5:C.bd}`,
            borderRadius:"11px",color:a.danger?C.r5:C.dk,fontWeight:"700",fontSize:"13px",
            cursor:"pointer",textAlign:"left"}},a.l));
      });
      main.appendChild(ag);
    }
  }

  // Load real patients from Firebase then render
  async function loadPatientsAndRender(){
    main.innerHTML="<p style='padding:20px;color:"+C.mu+";font-size:14px;'>Loading patients...</p>";
    try{
      const snap=await getDocs(query(collection(db,"users"),where("role","==","patient"),where("status","==","active")));
      REAL_PTS=snap.docs.map(d=>({id:d.id,...d.data(),...risk(d.data())}));
    }catch(e){REAL_PTS=[];}
    renderMain();
  }

  loadPatientsAndRender();
  return wrap;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(STATE.screen==="auth")app.appendChild(renderAuth());
  else if(STATE.screen==="pending")app.appendChild(renderPending());
  else if(STATE.role==="patient")app.appendChild(renderPatient());
  else app.appendChild(renderClinic());
}

// ── PENDING SCREEN ────────────────────────────────────────────────────────
function renderPending(){
  return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`linear-gradient(160deg,${C.p9},#071a2e)`,padding:"20px"}},
    h("div",{style:{background:C.wh,borderRadius:"24px",padding:"36px 28px",maxWidth:"380px",width:"100%",textAlign:"center"}},
      h("div",{style:{fontSize:"56px",marginBottom:"16px"}},"⏳"),
      h("h2",{style:{fontSize:"22px",fontWeight:"900",color:C.dk,marginBottom:"10px"}},"Account Pending Approval"),
      h("p",{style:{fontSize:"14px",color:C.mu,lineHeight:"1.7",marginBottom:"24px"}},"Your account is under review. A Mizan doctor will approve you shortly."),
      h("div",{style:{background:C.p1,borderRadius:"12px",padding:"14px",marginBottom:"20px"}},
        h("p",{style:{fontSize:"13px",color:C.p6,fontWeight:"600"}},"👤 "+(STATE.userDoc?.name||"")),
        h("p",{style:{fontSize:"12px",color:C.mu,marginTop:"4px"}},"📍 "+(STATE.userDoc?.city||"")+" · "+(STATE.userDoc?.diabType||""))
      ),
      btn("Sign Out",async()=>{await signOut(auth)},{full:true,v:"muted"})
    )
  );
}


onAuthStateChanged(auth,async(user)=>{
  document.getElementById("loadingScreen").style.display="none";
  document.getElementById("app").style.display="block";
  if(user){
    STATE.user=user;
    const profile=await getUserProfile(user.uid);
    STATE.userDoc=profile;
    STATE.role=profile?.role||"patient";
    if(STATE.role==="patient"&&profile?.status==="pending")STATE.screen="pending";
    else STATE.screen="app";
  }else{
    STATE.user=null;STATE.userDoc=null;STATE.role=null;STATE.screen="auth";
  }
  render();
});

window.addEventListener("online",()=>{STATE.online=true;render();});
window.addEventListener("offline",()=>{STATE.online=false;render();});

// Fallback: show login after 12s if Firebase never responds
setTimeout(()=>{
  const ls=document.getElementById("loadingScreen");
  if(ls&&ls.style.display!=="none"){
    ls.style.display="none";
    document.getElementById("app").style.display="block";
    STATE.screen="auth";
    render();
  }
},12000);

</script>
